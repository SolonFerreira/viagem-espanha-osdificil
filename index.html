<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌍 Os Difícil · Jun 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Supabase SDK — carregado após parsing HTML (defer), disponível no DOMContentLoaded -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
a,button{-webkit-tap-highlight-color:transparent;}
:root{
  --c-tf:#C2632A;--c-tf-l:#FDF4EE;--c-tf-b:#ECC99A;
  --c-md:#16A34A;--c-md-l:#F0FDF4;--c-md-b:#BBF7D0;
  --c-ma:#DC2626;--c-ma-l:#FEF2F2;--c-ma-b:#FECACA;
  --c-res:#4F46E5;--c-gas:#7C3AED;--c-pre:#0EA5E9;
  --c-red:#EF4444;--c-orange:#F97316;--c-green:#22C55E;
  --c-warn-bg:#FFFBEB;--c-warn-bd:#FCD34D;--c-warn-tx:#92400E;
  --c-food-bg:#F0FDF4;--c-food-bd:#86EFAC;--c-food-tx:#166534;
  --g0:#FFFEF9;--g50:#FAF8F4;--g100:#F2EDE8;--g200:#EAE3DC;
  --g300:#C8BEB4;--g400:#94A3B8;--g500:#64748B;--g700:#334155;--g900:#0F172A;
  --header-h:52px;--chips-h:50px;--sidebar-w:228px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --bottom-h:calc(64px + var(--safe-b));
  --sh-sm:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 12px rgba(0,0,0,.1);
  --sh-card:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  --dest:var(--c-tf);--dest-l:var(--c-tf-l);--dest-b:var(--c-tf-b);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--g50);color:var(--g900);min-height:100vh;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:500;height:var(--header-h);
  background:var(--g0);border-bottom:1px solid var(--g200);
  box-shadow:var(--sh-sm);display:flex;align-items:center;padding:0 6px 0 0;}
.brand{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;
  border-right:1px solid var(--g200);font-weight:800;font-size:14px;
  white-space:nowrap;color:var(--g900);text-decoration:none;flex-shrink:0;}
.brand-icon{font-size:20px;}
.brand-text{display:none;}
.dest-tabs{display:flex;gap:2px;padding:0 6px;overflow-x:auto;
  scrollbar-width:none;flex:1;}
.dest-tabs::-webkit-scrollbar{display:none;}
.tab{display:flex;align-items:center;gap:4px;padding:6px 12px;
  border:none;border-radius:20px;background:none;color:var(--g500);
  font-size:13px;font-weight:600;white-space:nowrap;
  transition:background .15s,color .15s;position:relative;}
.tab:hover{background:var(--g100);color:var(--g700);}
.tab[data-dest="tenerife"].active{background:var(--c-tf-l);color:var(--c-tf);font-weight:700;}
.tab[data-dest="madeira"].active{background:var(--c-md-l);color:var(--c-md);font-weight:700;}
.tab[data-dest="madrid"].active{background:var(--c-ma-l);color:var(--c-ma);font-weight:700;}
.tab[data-dest="reservas"].active{background:#EEF2FF;color:var(--c-res);font-weight:700;}
.tab[data-dest="gastro"].active{background:#F5F3FF;color:var(--c-gas);font-weight:700;}
.tab[data-dest="pretrip"].active{background:#F0F9FF;color:var(--c-pre);font-weight:700;}
.tab[data-dest="fotos"].active{background:var(--g100);color:var(--g900);font-weight:700;}
.tab-badge{position:absolute;top:3px;right:3px;width:8px;height:8px;
  border-radius:50%;background:var(--c-red);border:2px solid var(--g0);}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;z-index:480;background:rgba(0,0,0,.4);}
#overlay.show{display:block;}

/* ── DAY CHIPS ── */
#day-chips-wrap{position:sticky;top:var(--header-h);z-index:400;
  background:var(--g0);border-bottom:1px solid var(--g200);
  height:var(--chips-h);display:flex;align-items:center;padding:0 12px;}
#day-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  flex:1;padding:6px 0;}
#day-chips::-webkit-scrollbar{display:none;}
.day-chip{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 12px;border:1.5px solid var(--g200);border-radius:20px;
  background:var(--g0);color:var(--g500);font-size:11px;font-weight:600;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
  min-width:50px;min-height:36px;justify-content:center;}
.chip-icon{font-size:14px;line-height:1;}
.chip-num{font-size:10px;line-height:1;}
.day-chip.active{background:var(--dest);border-color:var(--dest);color:#fff;}
.day-chip:not(.active):hover{background:var(--g50);border-color:var(--g300);}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100dvh - var(--header-h) - var(--chips-h));}

/* ── SIDEBAR (desktop only) ── */
#sidebar{display:none;width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--g0);border-right:1px solid var(--g200);
  flex-direction:column;overflow:hidden;
  position:sticky;top:calc(var(--header-h) + var(--chips-h));
  height:calc(100dvh - var(--header-h) - var(--chips-h));}
.sidebar-dest{padding:12px 14px;border-bottom:1px solid var(--g100);flex-shrink:0;}
.sidebar-dest-label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--dest);margin-bottom:2px;}
.sidebar-dest-base{font-size:11px;color:var(--g500);line-height:1.4;}
#day-list{overflow-y:auto;flex:1;scrollbar-width:thin;}
#day-list::-webkit-scrollbar{width:4px;}
#day-list::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px;}
.day-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--g100);cursor:pointer;transition:background .1s;}
.day-row:hover{background:var(--g50);}
.day-row.active{background:var(--dest-l);}
.day-num-badge{width:28px;height:28px;border-radius:50%;background:var(--g100);color:var(--g700);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  flex-shrink:0;transition:background .15s,color .15s;}
.day-row.active .day-num-badge{background:var(--dest);color:#fff;}
.day-row-body{flex:1;min-width:0;}
.day-row-title{font-size:12px;font-weight:600;color:var(--g900);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-row-date{font-size:11px;color:var(--g500);}
.day-row-pips{display:flex;gap:3px;margin-top:2px;}
.pip{width:5px;height:5px;border-radius:50%;}
.pip-red{background:var(--c-red);}
.pip-orange{background:var(--c-orange);}
.pip-green{background:var(--c-green);}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden;}
#view-itinerary{display:flex;flex-direction:column;padding-bottom:var(--bottom-h);}
#view-reservas,#view-gastro,#view-pretrip{display:none;padding:16px;overflow-y:auto;}

/* ── DAY HEADER CARD ── */
#day-header-card{margin:12px 12px 0;padding:16px 16px;
  background:var(--g0);border-radius:var(--r-lg);box-shadow:var(--sh-card);
  border-top:3px solid var(--dest);}
.dhc-pill{display:inline-flex;align-items:center;gap:5px;
  background:var(--dest-l);color:var(--dest);font-size:11px;font-weight:700;
  padding:2px 10px;border-radius:20px;margin-bottom:10px;}
.dhc-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.dhc-title{font-size:19px;font-weight:800;line-height:1.2;color:var(--g900);flex:1;}
.dhc-intensity{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;margin-top:3px;}
.int-leve{background:#F0FDF4;color:#166534;}
.int-medio{background:#FFF7ED;color:#92400E;}
.int-intenso{background:#FEF2F2;color:#991B1B;}
.dhc-date{font-size:12px;color:var(--g500);margin-top:2px;}
.dhc-summary{margin-top:8px;font-size:13px;color:var(--g700);line-height:1.5;}
.flight-strip{margin-top:10px;padding:8px 12px;
  background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
  border:1px solid #BFDBFE;border-radius:8px;
  font-size:12px;font-weight:600;color:#1E40AF;line-height:1.5;}

/* ── NEXT ACTION CARD (removed — replaced by Plano do dia in day header) ── */

/* ── ALERT STYLES ── */
.alert-warn{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;
  border-radius:8px;background:var(--c-warn-bg);border-left:3px solid var(--c-warn-bd);
  font-size:12px;font-weight:600;color:var(--c-warn-tx);line-height:1.45;
  margin:8px 0 0;}

/* ── MAP SECTION ── */
#map-section{margin:10px 12px 0;border-radius:var(--r-md);overflow:hidden;
  border:1px solid var(--g200);background:var(--g0);box-shadow:var(--sh-card);
  display:flex;flex-direction:column;}
#map{height:240px;width:100%;transition:height .3s ease;flex-shrink:0;}
#map-section.collapsed #map{height:0;}
#map-section.collapsed .map-nav-btn{display:none;}
#map-section.collapsed #map-toggle-btn{flex:1;}
.map-action-bar{display:flex;align-items:stretch;gap:6px;padding:8px 10px;
  background:var(--g0);border-top:1px solid var(--g200);flex-shrink:0;}
.map-nav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
  min-height:38px;background:var(--g50);border:1px solid var(--g200);
  border-radius:8px;font-size:12px;font-weight:600;color:var(--g700);
  transition:background .1s;}
.map-nav-btn:active{background:var(--g100);}
#map-toggle-btn{flex-shrink:0;min-height:38px;padding:0 10px;
  background:none;border:1px solid var(--g200);border-radius:8px;
  font-size:11px;font-weight:600;color:var(--g400);white-space:nowrap;}
#map-toggle-btn:active{background:var(--g100);}
.popup-time{font-size:11px;font-weight:700;color:var(--dest);}
.popup-name{font-size:13px;font-weight:700;margin:2px 0;}
.popup-note{font-size:11px;color:#475569;max-width:180px;}

/* ── STOP CARDS ── */
#stop-cards{display:flex;flex-direction:column;gap:10px;padding:12px 12px 16px;}
.stop-card{background:var(--g0);border-radius:var(--r-md);box-shadow:var(--sh-card);
  padding:13px 14px;border-left:3px solid transparent;}
.stop-card.is-next{border-left-color:var(--dest);}
.sc-header{display:flex;align-items:flex-start;gap:10px;}
.sc-time{font-size:12px;font-weight:800;color:var(--dest);
  min-width:40px;flex-shrink:0;margin-top:3px;font-variant-numeric:tabular-nums;}
.sc-icon-wrap{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--g50);border:1.5px solid var(--g200);
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.sc-icon-wrap.is-dinner,.sc-icon-wrap.is-lunch{background:var(--dest-l);border-color:var(--dest-b);}
.sc-icon-wrap.is-transport{background:var(--g100);border-color:var(--g300);}
.sc-title{flex:1;font-size:14px;font-weight:700;color:var(--g900);line-height:1.35;min-width:0;}
.sc-details{padding-top:10px;}
.sc-notes{font-size:12px;color:var(--g500);line-height:1.6;}
.sc-food{margin-top:8px;padding:7px 10px;border-radius:7px;
  background:var(--c-food-bg);border-left:3px solid var(--c-food-bd);
  font-size:12px;color:var(--c-food-tx);line-height:1.45;}
.sc-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.sc-btn{display:flex;align-items:center;justify-content:center;gap:4px;
  min-height:36px;padding:0 14px;border-radius:8px;
  font-size:12px;font-weight:600;transition:opacity .1s;}
.sc-btn:active{opacity:.7;}
.sc-btn-nav{background:var(--dest);color:#fff;}
.sc-btn-detail{background:var(--g50);border:1px solid var(--g200);color:var(--g500);}

/* ── DAY RESERVAS (inside stop-cards) ── */
.day-res-block{background:var(--g0);border-radius:var(--r-md);
  box-shadow:var(--sh-card);padding:12px 14px;border-left:3px solid var(--c-res);}
.day-res-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--c-res);margin-bottom:10px;}
.res-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;}
.res-row+.res-row{border-top:1px solid var(--g100);}
.res-checkbox{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;
  border:2px solid var(--g300);background:var(--g0);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;transition:all .15s;}
.res-checkbox.done{background:var(--c-green);border-color:var(--c-green);}
.res-text{flex:1;min-width:0;}
.res-text.is-done .res-name,.res-text.is-done .res-how,.res-text.is-done .res-obs{
  opacity:.45;text-decoration:line-through;}
.res-badge{display:inline-block;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:10px;margin-bottom:2px;}
.badge-red{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
.badge-orange{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}
.badge-green{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.res-name{font-size:14px;font-weight:700;color:var(--g900);}
.res-how{font-size:12px;color:var(--g700);margin-top:1px;}
.res-obs{font-size:11px;color:var(--g500);margin-top:1px;font-style:italic;}

/* ── FOOD SUMMARY ── */
.food-block{background:var(--g0);border-radius:var(--r-md);
  box-shadow:var(--sh-card);padding:12px 14px;}
.food-block-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--g500);margin-bottom:8px;}
.food-line{display:flex;gap:7px;align-items:flex-start;padding:3px 0;
  font-size:12px;color:var(--g700);}
.food-line-icon{flex-shrink:0;}

/* ── BOTTOM BAR ── */
#bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:450;
  padding:8px 12px var(--safe-b);
  background:rgba(255,254,249,.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--g200);box-shadow:0 -4px 16px rgba(0,0,0,.06);}
#bottom-nav-btn{display:flex;align-items:center;justify-content:space-between;
  width:100%;min-height:50px;padding:0 18px;
  background:var(--dest);color:#fff;border-radius:var(--r-md);
  font-size:14px;font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.15);transition:opacity .1s;}
#bottom-nav-btn:active{opacity:.85;}
.bb-left{display:flex;flex-direction:column;align-items:flex-start;}
.bb-label{font-size:10px;font-weight:600;opacity:.8;letter-spacing:.03em;text-transform:uppercase;}
.bb-dest{font-size:14px;font-weight:800;}
.bb-icon{font-size:20px;}

/* ── FULL VIEWS (Reservas / Gastro) ── */
.view-title{font-size:20px;font-weight:800;color:var(--g900);}
.view-sub{font-size:13px;color:var(--g500);margin-top:2px;margin-bottom:20px;}
.progress-wrap{background:var(--g200);border-radius:20px;height:6px;margin-bottom:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--c-green);border-radius:20px;transition:width .4s;}
.progress-label{font-size:11px;color:var(--g500);text-align:right;margin-bottom:16px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.filt-btn{border:2px solid var(--g200);background:var(--g0);border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:600;color:var(--g700);
  transition:all .15s;min-height:36px;}
.filt-btn:hover{border-color:var(--g300);}
.filt-btn.f-all{background:var(--g900);color:#fff;border-color:var(--g900);}
.filt-btn.f-red{background:var(--c-red);color:#fff;border-color:var(--c-red);}
.filt-btn.f-orange{background:var(--c-orange);color:#fff;border-color:var(--c-orange);}
.filt-btn.f-green{background:var(--c-green);color:#fff;border-color:var(--c-green);}
.res-group-hd{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--g200);}
.big-res-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  margin-bottom:8px;background:var(--g0);border-radius:var(--r-md);
  border:1px solid var(--g200);box-shadow:var(--sh-card);}
.big-res-card.is-done{opacity:.55;}
.brc-check{width:24px;height:24px;border-radius:6px;flex-shrink:0;margin-top:2px;
  border:2px solid var(--g300);background:var(--g0);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;transition:all .15s;}
.brc-check.done{background:var(--c-green);border-color:var(--c-green);}
.brc-body{flex:1;min-width:0;}
.brc-body.is-done .brc-name{text-decoration:line-through;opacity:.6;}
.brc-dest{display:inline-block;font-size:10px;font-weight:700;color:#fff;
  padding:2px 8px;border-radius:10px;margin-bottom:4px;}
.brc-name{font-size:14px;font-weight:700;color:var(--g900);}
.brc-how{font-size:12px;color:var(--g700);margin-top:2px;}
.brc-obs{font-size:11px;color:var(--g500);margin-top:1px;font-style:italic;}
.alerts-box{margin-top:20px;padding:14px 16px;background:var(--c-warn-bg);
  border-radius:var(--r-md);border:1px solid var(--c-warn-bd);}
.alerts-box-title{font-size:13px;font-weight:700;color:var(--c-warn-tx);margin-bottom:8px;}
.alert-line{font-size:12px;color:var(--c-warn-tx);padding:3px 0;line-height:1.5;}
/* ── GASTRONOMIA ── */
.gastro-view{max-width:720px;}
.gastro-editorial{font-size:12px;color:var(--g500);font-style:italic;
  margin:-4px 0 14px;line-height:1.5;}
.gastro-filters{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.gastro-filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;align-items:center;}
.gastro-filter-row::-webkit-scrollbar{display:none;}
.gastro-filter-label{font-size:10px;font-weight:700;color:var(--g400);
  flex-shrink:0;line-height:1;width:60px;text-transform:uppercase;letter-spacing:.04em;}
.gf-chip{padding:5px 10px;border-radius:14px;border:1px solid var(--g200);
  background:var(--g0);font-size:11px;font-weight:500;color:var(--g700);
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.gf-chip.active{background:var(--g900);color:#fff;border-color:var(--g900);}
.gastro-count{font-size:12px;color:var(--g400);margin-bottom:10px;}
.gastro-empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px;}
/* Restaurant cards */
.rst-card{background:var(--g0);border-radius:var(--r-md);box-shadow:var(--sh-card);
  margin-bottom:8px;overflow:hidden;border-left:3px solid var(--g200);}
.rst-card.prio-alta{border-left-color:var(--c-green);}
.rst-card.prio-boa{border-left-color:var(--g300);}
.rst-card.prio-alt{border-left-color:var(--g100);opacity:.82;}
.rst-card.cat-cautela{border-left-color:var(--c-orange);}
.rst-header{display:flex;align-items:flex-start;gap:8px;padding:11px 14px 7px;cursor:pointer;}
.rst-name{flex:1;font-size:14px;font-weight:700;color:var(--g900);line-height:1.3;}
.rst-price{font-size:12px;font-weight:700;color:var(--g500);flex-shrink:0;padding-top:1px;}
.rst-chev{font-size:10px;color:var(--g400);flex-shrink:0;margin-top:3px;transition:transform .2s;}
.rst-card.open .rst-chev{transform:rotate(180deg);}
.rst-meta{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 9px;}
.rst-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;}
.rst-chip.dest-tf{background:var(--c-tf-l);color:var(--c-tf);}
.rst-chip.dest-md{background:var(--c-md-l);color:var(--c-md);}
.rst-chip.dest-ma{background:var(--c-ma-l);color:var(--c-ma);}
.rst-chip.cat{background:var(--g100);color:var(--g700);}
.rst-chip.bdg-reservar{background:#EFF6FF;color:#1D4ED8;}
.rst-chip.bdg-grupo{background:#F5F3FF;color:#6D28D9;}
.rst-chip.bdg-poncha{background:#FEF3C7;color:#92400E;}
.rst-chip.bdg-prio{background:#F0FDF4;color:#166534;}
.rst-chip.bdg-cautela{background:#FFF7ED;color:#C2410C;}
.rst-body{padding:10px 14px 12px;display:none;border-top:1px solid var(--g100);}
.rst-card.open .rst-body{display:block;}
.rst-row{display:flex;gap:8px;margin-bottom:5px;}
.rst-row-label{font-size:10px;font-weight:700;color:var(--g400);
  flex-shrink:0;width:76px;text-transform:uppercase;letter-spacing:.03em;padding-top:2px;}
.rst-row-val{font-size:12px;color:var(--g700);line-height:1.5;flex:1;}
.rst-obs{font-size:11px;color:var(--g500);margin-top:7px;padding:6px 8px;
  background:var(--g50);border-radius:6px;line-height:1.5;}
.rst-maps-btn{margin-top:10px;padding:7px 14px;border-radius:14px;border:none;
  background:#1A73E8;color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:inline-block;}
/* Anti-trap */
.antitrap-box{margin-top:20px;padding:14px 16px;background:var(--c-warn-bg);
  border:1px solid var(--c-warn-bd);border-radius:var(--r-md);}
.antitrap-title{font-size:13px;font-weight:700;color:var(--c-warn-tx);margin-bottom:8px;}
.antitrap-list{font-size:12px;color:var(--c-warn-tx);line-height:1.9;}
.antitrap-rule{margin-top:10px;font-size:12px;color:var(--c-warn-tx);font-style:italic;
  padding:8px;background:rgba(255,255,255,.45);border-radius:6px;line-height:1.5;}


/* ── SABORES LOCAIS (dish cards) ── */
.dish-section{margin-top:24px;border-top:1px solid var(--g100);padding-top:20px;}
.dish-section-title{font-size:15px;font-weight:700;color:var(--g900);margin-bottom:4px;}
.dish-section-intro{font-size:12px;color:var(--g500);font-style:italic;
  margin-bottom:14px;line-height:1.5;}
.dish-list{display:flex;flex-direction:column;gap:8px;}
.dish-card{background:var(--g0);border-radius:var(--r-md);box-shadow:var(--sh-card);
  overflow:hidden;border-left:3px solid var(--g200);}
.dish-card.dest-tf{border-left-color:var(--c-tf);}
.dish-card.dest-md{border-left-color:var(--c-md);}
.dish-card.dest-ma{border-left-color:var(--c-ma);}
.dish-header{display:flex;align-items:center;gap:8px;padding:10px 14px 5px;}
.dish-emoji{font-size:18px;flex-shrink:0;line-height:1;}
.dish-name{font-size:13px;font-weight:700;color:var(--g900);flex:1;line-height:1.3;}
.dish-desc{font-size:12px;color:var(--g700);padding:0 14px 8px;line-height:1.5;}
.dish-rows{padding:8px 14px 10px;display:flex;flex-direction:column;gap:5px;
  border-top:1px solid var(--g100);}
.dish-row{display:flex;gap:8px;}
.dish-row-lbl{font-size:10px;font-weight:700;color:var(--g400);
  flex-shrink:0;width:68px;text-transform:uppercase;letter-spacing:.03em;padding-top:2px;}
.dish-row-val{font-size:12px;color:var(--g700);line-height:1.5;flex:1;}
.dish-warn{font-size:11px;color:var(--c-warn-tx);background:var(--c-warn-bg);
  padding:5px 10px;border-radius:5px;margin:0 14px 10px;line-height:1.5;}

/* ── TRANSIT CONNECTOR ── */
.transit-row{display:flex;align-items:center;gap:5px;padding:0 14px 0 72px;
  color:var(--g300);font-size:10px;font-weight:500;line-height:1;
  min-height:18px;letter-spacing:.01em;}
.transit-dot{width:1px;height:12px;background:var(--g200);flex-shrink:0;}

/* ── STOP CARD DONE STATE ── */
.stop-card.is-done{opacity:.5;}
.stop-card.is-done .sc-title{text-decoration:line-through;color:var(--g400);}
.stop-card.is-done .sc-time{color:var(--g400);}
.stop-card.is-done .sc-icon-wrap{filter:grayscale(1);}
.sc-done-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--g300);
  background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;transition:all .2s;cursor:pointer;margin-top:3px;color:transparent;}
.sc-done-btn.done{background:var(--dest);border-color:var(--dest);color:#fff;}

/* ── DAY HEADER CARD: PROGRESS ── */
.dhc-progress{margin-top:14px;padding-top:12px;border-top:1px solid var(--g100);}
.dhc-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.dhc-prog-label{font-size:11px;color:var(--g500);}
.dhc-map-link{background:none;border:none;padding:0;font-size:11px;font-weight:600;
  color:var(--dest);cursor:pointer;white-space:nowrap;line-height:1.5;}
.dhc-map-link:active{opacity:.65;}
.dhc-prog-bar-wrap{background:var(--g200);border-radius:20px;height:4px;overflow:hidden;}
.dhc-prog-bar{height:100%;background:var(--c-green);border-radius:20px;transition:width .4s;}

/* ── PRÉ-VIAGEM VIEW ── */
.pre-view{max-width:720px;}
.pre-progress-wrap{background:var(--g200);border-radius:20px;height:7px;margin:8px 0 3px;overflow:hidden;}
.pre-progress-bar{height:100%;background:var(--c-pre);border-radius:20px;transition:width .4s;}
.pre-progress-label{font-size:12px;color:var(--g500);margin-bottom:20px;}
.pre-category{margin-bottom:12px;background:var(--g0);border-radius:var(--r-md);
  box-shadow:var(--sh-card);overflow:hidden;}
.pre-cat-hd{display:flex;align-items:center;gap:8px;padding:11px 14px;
  background:var(--g50);border-bottom:1px solid var(--g100);
  cursor:pointer;user-select:none;}
.pre-cat-icon{font-size:18px;}
.pre-cat-label{flex:1;font-size:14px;font-weight:700;color:var(--g900);}
.pre-cat-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;
  background:var(--g100);color:var(--g500);}
.pre-cat-count.has-all{background:#F0FDF4;color:#166534;}
.pre-cat-chev{font-size:11px;color:var(--g400);transition:transform .2s;flex-shrink:0;}
.pre-cat-hd[aria-expanded="false"] .pre-cat-chev{transform:rotate(-90deg);}
.pre-items{}
.pre-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--g100);}
.pre-item:last-child{border-bottom:none;}
.pre-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;
  border:2px solid var(--g300);background:var(--g0);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  font-weight:700;color:#fff;transition:all .15s;}
.pre-check.done{background:var(--c-green);border-color:var(--c-green);}
.pre-item-body{flex:1;min-width:0;}
.pre-item-label{font-size:14px;font-weight:600;color:var(--g900);line-height:1.35;}
.pre-item-note{font-size:11px;color:var(--g500);margin-top:2px;line-height:1.45;}
.pre-item.is-done .pre-item-label{text-decoration:line-through;color:var(--g400);}
.pre-item.is-done .pre-item-note{color:var(--g300);}
.pre-item.is-highlight{border-left:2px solid var(--c-orange);padding-left:12px;}
.pre-item.is-info{background:var(--g50);gap:8px;}
.pre-item.is-info .pre-item-label{font-weight:500;color:var(--g500);font-size:13px;}
.pre-info-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--c-pre);flex-shrink:0;margin-top:1px;opacity:.7;}
.pre-item.is-optional .pre-item-label::after{content:' · recomendado';font-size:11px;
  color:var(--g400);font-weight:400;}

/* ── DAY CHECKLIST CARD ── */
.day-checklist-card{background:var(--dest-l);border:1px solid var(--dest-b);
  border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;}
.dcl-title{font-size:12px;font-weight:700;color:var(--dest);margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
  text-transform:uppercase;letter-spacing:.05em;}
.dcl-toggle{font-size:11px;font-weight:600;color:var(--dest);opacity:.7;}
.dcl-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;
  border-bottom:1px solid var(--dest-b);font-size:13px;color:var(--g700);}
.dcl-item:last-child{border-bottom:none;}
.dcl-checkbox{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--dest);
  background:var(--g0);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;
  transition:all .15s;}
.dcl-checkbox.done{background:var(--dest);border-color:var(--dest);}
.dcl-item.done>span{text-decoration:line-through;color:var(--g400);}

/* ── MEAL PLAN CARD ── */
.meal-plan-card{background:var(--c-food-bg);border:1px solid var(--c-food-bd);
  border-radius:var(--r-md);padding:0;margin-bottom:8px;overflow:hidden;}
.meal-plan-card summary{font-size:12px;font-weight:700;color:var(--c-food-tx);
  padding:10px 14px;cursor:pointer;list-style:none;
  display:flex;justify-content:space-between;align-items:center;
  text-transform:uppercase;letter-spacing:.05em;}
.meal-plan-card summary::-webkit-details-marker{display:none;}
.meal-plan-card summary::after{content:'▾';font-size:11px;font-weight:700;}
.meal-plan-card[open] summary::after{content:'▴';}
.mpc-body{padding:0 14px 10px;}
.mpc-food-line{display:flex;gap:8px;align-items:flex-start;padding:5px 0;
  font-size:13px;color:var(--g700);border-bottom:1px solid var(--c-food-bd);}
.mpc-food-line:last-child{border-bottom:none;}
.mpc-food-icon{flex-shrink:0;}

/* ── BUDGET PILL ── */
.dhc-budget{font-size:11px;font-weight:700;color:#166534;background:#DCFCE7;
  padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px;}

/* ── STOP DURATION ── */
.sc-dur{font-size:10px;font-weight:600;color:var(--g500);background:var(--g100);
  padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle;white-space:nowrap;}

/* ── STOP GUIDE TEXT ── */
.sc-guide{font-size:13px;color:var(--g700);line-height:1.65;font-style:italic;
  padding-bottom:8px;border-bottom:1px solid var(--g100);margin-bottom:6px;}

/* ── RETURN STOP ── */
.sc-icon-wrap.is-return{background:var(--dest-l);border-color:var(--dest-b);}

/* ── FOTOS VIEW ── */
#view-fotos{display:none;overflow-y:auto;padding-bottom:var(--bottom-h);}
.fotos-header{padding:16px 16px 8px;}
.fotos-dest-filter{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.fotos-dest-filter::-webkit-scrollbar{display:none;}
.fdf-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--g200);
  background:var(--g0);color:var(--g500);font-size:12px;font-weight:600;
  white-space:nowrap;transition:all .15s;flex-shrink:0;}
.fdf-btn.active{font-weight:700;border-color:var(--dest-b);
  background:var(--dest-l);color:var(--dest);}
.fotos-day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 20px;}
.foto-day-card{border-radius:var(--r-md);overflow:hidden;background:var(--g0);
  box-shadow:var(--sh-card);cursor:pointer;transition:opacity .15s;}
.foto-day-card:active{opacity:.75;}
.fdc-thumb{width:100%;aspect-ratio:1;background:var(--g100);overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;}
.fdc-thumb img{width:100%;height:100%;object-fit:cover;}
.fdc-thumb-empty{font-size:28px;color:var(--g300);}
.fdc-thumb-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;width:100%;height:100%;}
.fdc-thumb-grid img{width:100%;height:100%;object-fit:cover;}
.fdc-info{padding:8px 10px 10px;}
.fdc-date{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.fdc-title{font-size:13px;font-weight:700;color:var(--g900);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fdc-count{font-size:11px;color:var(--g500);margin-top:2px;}
/* Day photos view */
.day-photos-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;
  position:sticky;top:0;background:var(--g50);z-index:10;border-bottom:1px solid var(--g200);}
.dph-back{background:none;border:none;font-size:20px;color:var(--g700);cursor:pointer;
  padding:4px;line-height:1;flex-shrink:0;}
.dph-title{flex:1;font-size:16px;font-weight:800;color:var(--g900);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dph-add-btn{display:flex;align-items:center;gap:4px;padding:7px 14px;
  background:var(--dest);color:#fff;border:none;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;transition:opacity .1s;
  white-space:nowrap;flex-shrink:0;}
.dph-add-btn:active{opacity:.8;}
.dph-add-btn.needs-login{background:var(--g100);color:var(--g700);}
.day-photos-list{display:flex;flex-direction:column;gap:10px;padding:12px 12px 20px;}
.dp-item{border-radius:var(--r-md);overflow:hidden;background:var(--g0);box-shadow:var(--sh-card);}
.dp-img{width:100%;max-height:340px;object-fit:cover;display:block;}
.dp-meta{padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.dp-caption{font-size:13px;color:var(--g700);line-height:1.45;flex:1;}
.dp-uploader{font-size:11px;font-weight:600;color:var(--g400);margin-top:3px;}
.dp-delete-btn{background:none;border:none;font-size:16px;color:var(--g300);cursor:pointer;
  padding:2px;flex-shrink:0;transition:color .15s;line-height:1;}
.dp-delete-btn:hover{color:var(--c-red);}
.dp-empty{text-align:center;padding:48px 20px;color:var(--g400);font-size:14px;line-height:2;}
.dp-loading{text-align:center;padding:36px 16px;color:var(--g400);font-size:13px;}
/* Header user chip */
.header-user{display:flex;align-items:center;padding:0 10px 0 4px;flex-shrink:0;}
.header-user-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;
  border:1px solid var(--g200);background:var(--g0);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--g700);cursor:pointer;
  transition:all .15s;white-space:nowrap;}
.header-user-btn:active{background:var(--g100);}
.header-user-btn.logged-in{background:var(--dest-l);border-color:var(--dest-b);color:var(--dest);}
/* Day header photo strip */
.dhc-photos-strip{display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;
  background:var(--g50);border-radius:8px;cursor:pointer;border:1px solid var(--g200);
  transition:background .1s;}
.dhc-photos-strip:active{background:var(--g100);}
.dhc-photos-label{font-size:12px;font-weight:600;color:var(--g500);flex:1;}
.dhc-photos-thumbs{display:flex;gap:3px;}
.dhc-photo-thumb{width:26px;height:26px;border-radius:5px;object-fit:cover;}
/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-sheet{background:var(--g0);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;padding:20px 20px calc(20px + var(--safe-b));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:90dvh;overflow-y:auto;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--g200);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:800;color:var(--g900);margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--g500);margin-bottom:18px;line-height:1.5;}
.modal-label{display:block;font-size:11px;font-weight:700;color:var(--g500);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.modal-input{width:100%;padding:12px 14px;border:1.5px solid var(--g200);
  border-radius:10px;font-size:15px;font-family:inherit;color:var(--g900);
  background:var(--g0);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.modal-input:focus{border-color:var(--dest);}
.modal-btn-primary{width:100%;min-height:50px;background:var(--dest);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  margin-top:14px;transition:opacity .1s;}
.modal-btn-primary:active{opacity:.85;}
.modal-btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.modal-btn-secondary{width:100%;min-height:44px;background:none;color:var(--g500);
  border:1px solid var(--g200);border-radius:12px;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:8px;}
.modal-status{font-size:13px;color:var(--g500);margin-top:10px;min-height:18px;
  line-height:1.45;text-align:center;}
.modal-status.error{color:var(--c-red);}
.modal-status.success{color:#166534;}
/* Upload modal */
.upload-preview{width:100%;aspect-ratio:16/10;border-radius:10px;background:var(--g100);
  margin-bottom:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;}
.upload-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.upload-preview-ph{font-size:36px;color:var(--g300);}
.upload-file-btn{width:100%;min-height:44px;background:var(--g50);
  border:2px dashed var(--g200);border-radius:10px;font-size:14px;font-weight:600;
  color:var(--g500);cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:6px;transition:all .15s;}
.upload-file-btn:active{background:var(--g100);}
.upload-progress-wrap{height:4px;background:var(--g100);border-radius:2px;
  margin-top:10px;overflow:hidden;display:none;}
.upload-progress-bar{height:100%;background:var(--dest);border-radius:2px;width:0;transition:width .3s;}
/* Setup banner */
.setup-banner{margin:20px 16px;padding:16px;background:var(--c-warn-bg);
  border:1px solid var(--c-warn-bd);border-radius:var(--r-md);font-size:13px;
  color:var(--c-warn-tx);line-height:1.7;}
.setup-banner strong{display:block;font-size:14px;font-weight:800;margin-bottom:6px;}
.setup-code{background:rgba(0,0,0,.07);border-radius:4px;padding:1px 6px;
  font-family:monospace;font-size:12px;}

/* ── TABLET ── */
@media(min-width:641px){
  .brand-text{display:block;}
  #day-chips-wrap{padding:0 20px;}
  #stop-cards{padding:12px 20px 16px;gap:10px;}
  #day-header-card{margin:14px 20px 0;}
  #map-section{margin:12px 20px 0;}
  .dish-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  .fotos-day-grid{grid-template-columns:repeat(3,1fr);padding:0 20px 20px;}
  .fotos-dest-filter{padding:0 20px 12px;}
  .fotos-header{padding:16px 20px 8px;}
  .day-photos-list{padding:12px 20px 20px;}
  .modal-overlay{align-items:center;}
  .modal-sheet{border-radius:16px;max-height:85dvh;}
}

/* ── DESKTOP ── */
@media(min-width:1025px){
  #sidebar{display:flex;}
  #day-chips-wrap{display:none;}
  .layout{min-height:calc(100vh - var(--header-h));}
  #view-itinerary{padding-bottom:32px;}
  #bottom-bar{display:none!important;}
  #day-header-card{margin:16px 20px 0;}
  #map-section{margin:12px 20px 0;}
  #map{height:260px;}
  #stop-cards{padding:12px 20px 24px;gap:10px;}
  .next-action-card{max-width:760px;}
  #view-reservas,#view-gastro{padding:20px;}
  .dish-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
}
</style>
</head>
<body>

<header>
  <a class="brand" href="#" onclick="return false">
    <span class="brand-icon">🌍</span>
    <span class="brand-text">Os Difícil · Jun 2026</span>
  </a>
  <nav class="dest-tabs" id="destTabs"></nav>
  <div class="header-user" id="header-user"></div>
</header>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="day-chips-wrap"><div id="day-chips"></div></div>

<div class="layout">

<!-- ═══════ MODAL: LOGIN ═══════ -->
<div class="modal-overlay" id="auth-modal" onclick="handleOverlayClick(event,'auth-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Entrar no álbum</div>
    <div class="modal-sub">Digite seu email para receber um link de acesso.<br>Sem senha.</div>
    <label class="modal-label" for="auth-email">Email</label>
    <input class="modal-input" id="auth-email" type="email" placeholder="nome@email.com"
      autocomplete="email" inputmode="email">
    <button class="modal-btn-primary" id="auth-submit-btn" onclick="handleAuthSubmit()">
      Enviar link de acesso
    </button>
    <div class="modal-status" id="auth-status"></div>
    <button class="modal-btn-secondary" onclick="closeModal('auth-modal')">Cancelar</button>
  </div>
</div>

<!-- ═══════ MODAL: NOME (primeiro login) ═══════ -->
<div class="modal-overlay" id="name-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Como você quer aparecer?</div>
    <div class="modal-sub">Seu nome vai aparecer junto com suas fotos. Só precisa fazer isso uma vez.</div>
    <label class="modal-label" for="name-input">Nome</label>
    <input class="modal-input" id="name-input" type="text" placeholder="Ex: Solon"
      autocomplete="name" maxlength="30">
    <button class="modal-btn-primary" onclick="handleNameSubmit()">Salvar</button>
  </div>
</div>

<!-- ═══════ MODAL: UPLOAD ═══════ -->
<div class="modal-overlay" id="upload-modal" onclick="handleOverlayClick(event,'upload-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="upload-modal-title">Adicionar foto</div>
    <input type="file" id="upload-file-input" accept="image/*" style="display:none"
      onchange="handleFileSelected(event)">
    <div class="upload-preview" id="upload-preview"
      onclick="document.getElementById('upload-file-input').click()">
      <span class="upload-preview-ph">📷</span>
    </div>
    <button class="upload-file-btn" onclick="document.getElementById('upload-file-input').click()">
      Escolher foto da galeria
    </button>
    <div class="upload-progress-wrap" id="upload-progress-wrap">
      <div class="upload-progress-bar" id="upload-progress-bar"></div>
    </div>
    <div style="margin-top:14px;">
      <label class="modal-label" for="upload-caption">Legenda (opcional)</label>
      <input class="modal-input" id="upload-caption" type="text"
        placeholder="Ex: Playa del Duque ao pôr do sol" maxlength="120">
    </div>
    <button class="modal-btn-primary" id="upload-submit-btn"
      onclick="handleUploadSubmit()" disabled>Enviar foto</button>
    <div class="modal-status" id="upload-status"></div>
    <button class="modal-btn-secondary" onclick="closeModal('upload-modal')">Cancelar</button>
  </div>
</div>

//  MAP
// ════════════════════════════════════════════════════════════
let leafMap = null, mapLayers = [];

function ensureMap() {
  if (leafMap) return;
  leafMap = L.map('map', { zoomControl:true, attributionControl:true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom:19
  }).addTo(leafMap);
}
function clearMapLayers() { mapLayers.forEach(l => l.remove()); mapLayers = []; }

function updateMap() {
  ensureMap(); clearMapLayers();
  const dest = DEST[S.dest], day = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!pts.length) { leafMap.setView(dest.mapCenter, dest.mapZoom); setTimeout(() => leafMap.invalidateSize(), 120); return; }

  // Marcador 🏠 da hospedagem como ponto de partida (quando o dia não começa no aeroporto)
  const origin = getDayOrigin(dest, day);
  let latlngs = pts.map(p => [p.lat, p.lng]);
  if (origin) {
    const [oLat, oLng] = origin.split(',').map(Number);
    const homeIcon = L.divIcon({
      className: '',
      html: `<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">🏠</div>`,
      iconAnchor: [11, 22]
    });
    const homeMarker = L.marker([oLat, oLng], { icon: homeIcon }).addTo(leafMap);
    homeMarker.bindPopup('<b>Ponto de partida</b><br>Hospedagem do grupo');
    mapLayers.push(homeMarker);
    latlngs = [[oLat, oLng], ...latlngs];
  }

  const line = L.polyline(latlngs, { color:dest.color, weight:3, opacity:.65, dashArray:'8,5' }).addTo(leafMap);
  mapLayers.push(line);
  pts.forEach((stop, i) => {
    const html = `<div style="position:relative;display:flex;flex-direction:column;align-items:center">
      <div style="width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        background:${dest.color};border:2px solid #fff;display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 6px rgba(0,0,0,.28)">
        <span style="transform:rotate(45deg);font-size:13px">${stop.icon}</span></div>
      <div style="background:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-top:2px;
        box-shadow:0 1px 3px rgba(0,0,0,.2);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        color:${dest.color};">${i+1}. ${stop.name.split('·')[0].trim()}</div></div>`;
    const icon = L.divIcon({ html, className:'', iconSize:[36,52], iconAnchor:[16,46] });
    const m = L.marker([stop.lat, stop.lng], { icon }).addTo(leafMap);
    m.bindPopup(`<div class="popup-time">${stop.t||''}</div><div class="popup-name">${stop.name}</div><div class="popup-note">${stop.notes||''}</div>`);
    mapLayers.push(m);
  });
  const bounds = L.latLngBounds(latlngs);
  leafMap.fitBounds(bounds, { padding:[32,32], maxZoom:14 });
  setTimeout(() => leafMap.invalidateSize(), 120);
}

function toggleMap() {
  S.mapCollapsed = !S.mapCollapsed;
  const sec    = document.getElementById('map-section');
  const btn    = document.getElementById('map-toggle-btn');
  const dhcBtn = document.getElementById('dhc-map-btn');
  sec.classList.toggle('collapsed', S.mapCollapsed);
  if (btn)    btn.textContent    = S.mapCollapsed ? '▾ Ver mapa' : '▴ Fechar';
  if (dhcBtn) dhcBtn.textContent = S.mapCollapsed ? 'Ver mapa ▾' : 'Ocultar ▴';
  if (!S.mapCollapsed) setTimeout(() => { updateMap(); leafMap && leafMap.invalidateSize(); }, 320);
}

// ════════════════════════════════════════════════════════════
//  NAVIGATION URLS
// ════════════════════════════════════════════════════════════
function getDayOrigin(dest, day) {
  if (!dest.baseLat || !dest.baseLng) return null;
  const firstNav = day.stops.find(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!firstNav || firstNav.cls === 'is-transport') return null;
  return `${dest.baseLat},${dest.baseLng}`;
}
function buildGoogleMapsUrl() {
  const dest = DEST[S.dest], day = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!pts.length) return null;
  function toName(stop) {
    let n = stop.name.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u2600-\u27BF\uFE0F]/g,'').trim();
    n = n.replace(/^(jantar|almoço|café|bar|lanche)\s*·\s*/i,'');
    n = n.replace(/^(check-out|check-in)\s+/i,'');
    if (n.includes('·')) n = n.split('·')[0].trim();
    if (!n) n = dest.name;
    return encodeURIComponent(`${n} ${dest.name}`);
  }
  const origin = getDayOrigin(dest, day);
  const op = origin ? `&origin=${origin}` : '';
  if (pts.length === 1) return `https://www.google.com/maps/dir/?api=1${op}&destination=${toName(pts[0])}&travelmode=driving`;
  const dst = toName(pts[pts.length-1]);
  const wp  = pts.slice(0,-1).map(toName).join('|');
  let url = `https://www.google.com/maps/dir/?api=1${op}&destination=${dst}&travelmode=driving`;
  if (wp) url += `&waypoints=${wp}`;
  return url;
}
function buildWazeUrl() {
  const dest = DEST[S.dest], day = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!pts.length) return null;
  const origin = getDayOrigin(dest, day);
  const fromParam = origin ? `&from=${origin}` : '';
  return `https://waze.com/ul?ll=${pts[0].lat},${pts[0].lng}${fromParam}&navigate=yes&zoom=17`;
}
function openGoogleMaps() { const u=buildGoogleMapsUrl(); if(u) window.open(u,'_blank'); }
function openWaze()        { const u=buildWazeUrl();        if(u) window.open(u,'_blank'); }

function cleanStopName(stop, destName) {
  let n = stop.name.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u2600-\u27BF\uFE0F]/g,'').trim();
  n = n.replace(/^(jantar|almoço|café|bar|lanche)\s*·\s*/i,'');
  n = n.replace(/^(check-out|check-in)\s+/i,'');
  if (n.includes('·')) n = n.split('·')[0].trim();
  if (!n) n = destName;
  return `${n} ${destName}`;
}
function navigateToStop(stop) {
  if (!stop) return;
  const destName = DEST[S.dest].name;
  const q = encodeURIComponent(cleanStopName(stop, destName));
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${q}&travelmode=driving`,'_blank');
}
function openWazeToStop(stop) {
  if (!stop || !stop.lat) return;
  window.open(`https://waze.com/ul?ll=${stop.lat},${stop.lng}&navigate=yes&zoom=17`,'_blank');
}

  if (s.includes('metrô') || s.includes('metro') || s.includes('ônibus') || s.includes('bus')) return '🚇';

}
function makeDayChecklistKey(destId, dayN, itemId) { return `${destId}:d${dayN}:${itemId}`; }
function toggleDayChecklistItem(destId, dayN, itemId) {

// ════════════════════════════════════════════════════════════
//  TRIP ACTIVITY PROGRESS (localStorage: "tripProgress")
//  NOTE: localStorage persists only within the same device and
//  browser. Progress is NOT synced between devices or users.
// ════════════════════════════════════════════════════════════
function getTripProgress() {
  try { return JSON.parse(localStorage.getItem('tripProgress')||'{}'); } catch { return {}; }
}
function getStopSlug(stop) {
  // Generates a stable ID from the stop name — safe to use as localStorage key fragment
  return stop.name
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/[\u2600-\u27BF\uFE0F]/g,'')
    .replace(/[·⚠️]/g,'')
    .trim().toLowerCase()
    .replace(/[^\w\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .substring(0,40);
}
function makeTripKey(destId, dayN, stop) {
  return `${destId}:d${dayN}:${getStopSlug(stop)}`;
}
function getDayProgress(destId, dayN, stops) {
  const tp = getTripProgress();
  const actStops = stops.filter(s => !s.name.startsWith('🎒'));
  const total = actStops.length;
  const done  = actStops.filter(s => !!tp[makeTripKey(destId, dayN, s)]).length;
  return { total, done };
}
function toggleTripActivity(destId, dayN, stopIdx) {
  const day = DEST[destId].days.find(d => d.n === dayN);
  if (!day) return;
  const stop = day.stops[stopIdx];
  if (!stop || stop.name.startsWith('🎒')) return;
  const tp  = getTripProgress();
  const key = makeTripKey(destId, dayN, stop);
  if (tp[key]) delete tp[key]; else tp[key] = true;
  localStorage.setItem('tripProgress', JSON.stringify(tp));
  renderDayHeaderCard();
  renderStopCards();
}

async function loadDayPhotos(destId, dayN) {
  const key = `${destId}:${dayN}`;
  if (S.photosCache[key] !== undefined) return S.photosCache[key];
  if (!sb) { S.photosCache[key]=[]; return []; }
  try {
    const { data, error } = await sb.from('trip_photos').select('*')
      .eq('dest_id', destId).eq('day_n', dayN).order('uploaded_at');
    if (error) throw error;
    S.photosCache[key] = data||[];
    return S.photosCache[key];
  } catch(e) { console.warn('loadDayPhotos error', e); S.photosCache[key]=[]; return []; }
}

async function uploadPhoto(file, destId, dayN, caption) {
  if (!sb || !S.authUser) throw new Error('Não autenticado');
  // Compress/convert to JPEG
  let blob;
  try { blob = await compressToJpeg(file); }
  catch(e) {
    // Fallback: upload original if canvas can't decode (e.g. HEIC on Android)
    blob = file;
  }
  const ext  = blob.type === 'image/jpeg' ? 'jpg' : (file.name.split('.').pop() || 'jpg');
  const path = `photos/${destId}/d${dayN}/${crypto.randomUUID()}.${ext}`;
  const { error:upErr } = await sb.storage.from('photos').upload(path, blob, {
    contentType: blob.type || 'image/jpeg', cacheControl:'3600'
  });
  if (upErr) throw upErr;
  const { data:{ publicUrl } } = sb.storage.from('photos').getPublicUrl(path);
  const uploaderName = S.authUser.user_metadata?.name || S.authUser.email.split('@')[0];
  const { error:dbErr } = await sb.from('trip_photos').insert({
    dest_id:destId, day_n:dayN, storage_path:path, public_url:publicUrl,
    caption:caption||null, uploader_name:uploaderName, uploader_email:S.authUser.email
  });
  if (dbErr) throw dbErr;
  delete S.photosCache[`${destId}:${dayN}`]; // invalidar cache
}

async function deletePhoto(photoId, storagePath) {
  if (!sb || !S.authUser) throw new Error('Não autenticado');
  await sb.storage.from('photos').remove([storagePath]);
  const { error } = await sb.from('trip_photos').delete().eq('id', photoId);
  if (error) throw error;
  S.photosCache = {}; // limpar todo o cache
}

// Canvas compression — converts any image (incl. HEIC on iOS) to JPEG ≤1200px
function compressToJpeg(file, maxW=1200, quality=0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w=img.width, h=img.height;
      if (w > maxW) { h=Math.round(h*maxW/w); w=maxW; }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(b => {
        URL.revokeObjectURL(url);
        b ? resolve(b) : reject(new Error('canvas.toBlob falhou'));
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Falha ao carregar imagem')); };
    img.src = url;
  });
}

function fmtDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

async function renderDayPhotosView(destId, dayN) {
  const container = document.getElementById('view-fotos');

    ? `<button class="dph-add-btn" style="--dest:${dest.color}"
        onclick="openUploadModal('${destId}',${dayN})">+ Foto</button>`
    : `<button class="dph-add-btn needs-login"

    <div class="dph-title">${dest.emoji} Dia ${dayN} · ${day.title}</div>
    ${addBtnHtml}
  </div>`;

  container.innerHTML = headerHtml + `<div class="day-photos-list dp-loading">Carregando fotos...</div>`;

  const photos = await loadDayPhotos(destId, dayN);

  let listHtml;
  if (!photos.length) {
    listHtml = `<div class="dp-empty">📷<br>Nenhuma foto ainda.<br>Seja o primeiro a marcar este dia!</div>`;
  } else {
    const userEmail = S.authUser?.email;
    listHtml = photos.map(p => {
      const isOwn = p.uploader_email === userEmail;
      return `<div class="dp-item">
        <img class="dp-img" src="${p.public_url}" alt="${p.caption||''}" loading="lazy">
        <div class="dp-meta">
          <div style="flex:1">
            ${p.caption?`<div class="dp-caption">${p.caption}</div>`:''}
            <div class="dp-uploader">${p.uploader_name||'Anônimo'} · ${fmtDate(p.uploaded_at)}</div>

            onclick="confirmDeletePhoto('${p.id}','${p.storage_path}')">✕</button>`:''}
        </div>
      </div>`;
    }).join('');
  }

  container.innerHTML = headerHtml + `<div class="day-photos-list">${listHtml}</div>`;
}

function openUploadModal(destId, dayN) {

function handleFileSelected(event) {
  const file = event.target?.files?.[0];
  if (!file) return;
  _selectedFile = file;
  const prev = document.getElementById('upload-preview');
  if (prev) {
    const url = URL.createObjectURL(file);
    prev.innerHTML = `<img src="${url}" alt="Preview">`;
  }
  const btn = document.getElementById('upload-submit-btn');
  if (btn) btn.disabled = false;
}

async function handleUploadSubmit() {
  if (!_selectedFile || !S.uploadTarget) return;
  const btn   = document.getElementById('upload-submit-btn');
  const pw    = document.getElementById('upload-progress-wrap');
  const pb    = document.getElementById('upload-progress-bar');
  btn.disabled=true; btn.textContent='Comprimindo...';
  if (pw) pw.style.display='block'; if (pb) pb.style.width='30%';
  setModalStatus('upload-status','','');
  try {
    const caption = (document.getElementById('upload-caption')?.value||'').trim();
    btn.textContent='Enviando...'; if (pb) pb.style.width='60%';
    await uploadPhoto(_selectedFile, S.uploadTarget.destId, S.uploadTarget.dayN, caption);
    if (pb) pb.style.width='100%';
    setModalStatus('upload-status','✅ Foto enviada!','success');
    btn.textContent='Enviado!';
    // Fechar e atualizar views
    setTimeout(() => {
      closeModal('upload-modal');
      if (S.view==='fotos' && S.photosView==='day' && S.photosDay &&
          S.photosDay.destId===S.uploadTarget.destId && S.photosDay.dayN===S.uploadTarget.dayN) {
        renderPhotosView();
      }
      if (S.view==='itinerary') renderDayHeaderCard();
    }, 1200);
  } catch(err) {
    if (pb) pb.style.width='0';
    setModalStatus('upload-status','Erro: ' + (err.message||'tente novamente'),'error');
    btn.disabled=false; btn.textContent='Tentar novamente';
  }
}

function renderDayChips() {

  setTimeout(() => {
    const active = document.querySelector('.day-chip.active');
    if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function renderSidebar() {

    const hasR=day.res.some(r=>r.prio==='red'), hasO=day.res.some(r=>r.prio==='orange'), hasG=day.res.some(r=>r.prio==='green');
    const pips=[hasR?'<span class="pip pip-red"></span>':''
               ,hasO?'<span class="pip pip-orange"></span>':''
               ,hasG?'<span class="pip pip-green"></span>':''
    ].join('');
    return `<div class="day-row${S.dayIdx===i?' active':''}" onclick="switchDay(${i})">
      <div class="day-num-badge">${day.n}</div>
      <div class="day-row-body">
        <div class="day-row-title">${day.title}</div>
        <div class="day-row-date">${day.wd} · ${day.date}</div>
        ${pips?`<div class="day-row-pips">${pips}</div>`:''}

}

// ════════════════════════════════════════════════════════════
//  RENDER: DAY HEADER CARD
// ════════════════════════════════════════════════════════════
function renderDayHeaderCard() {
  const dest = DEST[S.dest], day = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => !s.name.startsWith('🎒') && s.lat);
  const int  = pts.length<=3?{l:'Leve',c:'int-leve'}:pts.length<=5?{l:'Médio',c:'int-medio'}:{l:'Intenso',c:'int-intenso'};
  const { total, done } = getDayProgress(S.dest, day.n, day.stops);
  const pct = total ? Math.round(done/total*100) : 0;
  const mapBtnText = S.mapCollapsed ? 'Ver mapa ▾' : 'Ocultar ▴';
  let html = `
    <div class="dhc-pill">${dest.emoji} ${dest.name} · Dia ${day.n}</div>
    <div class="dhc-row">
      <div class="dhc-title">${day.title}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
        <span class="dhc-intensity ${int.c}">${int.l}</span>
        ${day.budgetEst?`<span class="dhc-budget">💰 ${day.budgetEst}</span>`:''}
      </div>
    </div>
    <div class="dhc-date">${day.wd}, ${day.date}</div>
    <div class="dhc-summary">${day.summary}</div>`;
  if (day.flight) html += `<div class="flight-strip">✈️ VOO ${day.flight.route} · ${day.flight.dep} → ${day.flight.arr} · ${day.flight.num} · ${day.flight.info}</div>`;
  html += `
    <div class="dhc-progress">
      <div class="dhc-prog-row">
        <span class="dhc-prog-label">${done} de ${total} atividades${day.totalDriveEst ? ' · '+day.totalDriveEst : ''}</span>
        <button class="dhc-map-link" id="dhc-map-btn" onclick="toggleMap()">${mapBtnText}</button>
      </div>
      <div class="dhc-prog-bar-wrap"><div class="dhc-prog-bar" style="width:${pct}%"></div></div>
    </div>`;
  // Photo strip — usa apenas cache em memória (sem await) para não bloquear render síncrono
  if (SUPABASE_OK) {
    const cached = S.photosCache[`${S.dest}:${day.n}`];
    if (cached && cached.length > 0) {
      const c=cached.length;
      const thumbs=cached.slice(0,3).map(p=>`<img class="dhc-photo-thumb" src="${p.public_url}" alt="" loading="lazy">`).join('');
      html += `<div class="dhc-photos-strip" onclick="switchToPhotosDay('${S.dest}',${day.n})">
        <div class="dhc-photos-thumbs">${thumbs}</div>
        <span class="dhc-photos-label">📷 ${c} foto${c>1?'s':''} · ver</span>
      </div>`;
    }
  }
  document.getElementById('day-header-card').innerHTML = html;
  // update bottom bar destination label
  const bb = document.getElementById('bb-dest-name');
  if (bb) bb.textContent = dest.emoji + ' ' + dest.name + ' · Dia ' + day.n;
}



// ════════════════════════════════════════════════════════════
//  RENDER: STOP CARDS
// ════════════════════════════════════════════════════════════
function badgeHtml(prio) {
  if (prio==='red')    return '<span class="res-badge badge-red">🔴 URGENTE</span>';
  if (prio==='orange') return '<span class="res-badge badge-orange">🟠 ALTA PRIORIDADE</span>';
  return '<span class="res-badge badge-green">🟢 RECOMENDADO</span>';
}
function renderStopCards() {
  const dest=DEST[S.dest], day=dest.days[S.dayIdx], ch=getChecked(), tp=getTripProgress();
  const dcls = getDayChecklistState();
  let html = '';

  // 1. Day checklist card (if day has curated items)
  if (day.checklist && day.checklist.length) {
    const total = day.checklist.length;
    const done  = day.checklist.filter(it => dcls[makeDayChecklistKey(S.dest, day.n, it.id)]).length;
    html += `<div class="day-checklist-card">
      <div class="dcl-title">📋 Antes de sair <span class="dcl-toggle">${done}/${total} ✓</span></div>`;
    day.checklist.forEach(it => {
      const k    = makeDayChecklistKey(S.dest, day.n, it.id);
      const done = !!dcls[k];
      html += `<div class="dcl-item${done?' done':''}">
        <div class="dcl-checkbox${done?' done':''}" onclick="toggleDayChecklistItem('${S.dest}',${day.n},'${it.id}')">${done?'✓':''}</div>
        <span>${it.text}</span>
      </div>`;
    });
    html += '</div>';
  }

  // 2. Meal plan card (foodLines promoted to top, collapsible)
  if (day.foodLines && day.foodLines.length) {
    html += `<details class="meal-plan-card" open>
      <summary>🍽️ Plano de refeições</summary>
      <div class="mpc-body">`;
    html += day.foodLines.map(f=>`<div class="mpc-food-line"><span class="mpc-food-icon">${f.i}</span><span>${f.t}</span></div>`).join('');
    html += '</div></details>';
  }

  // 3. Stop cards
  html += day.stops.map((stop, idx) => {
    const isReturn    = stop.cls === 'is-return';
    const hasNav      = stop.lat && stop.lng && !stop.name.startsWith('🎒') && !isReturn;
    const hasExtra    = stop.notes || stop.food || stop.guide;
    const isReminder  = stop.name.startsWith('🎒');
    const tripKey     = makeTripKey(S.dest, day.n, stop);
    const isDone      = !isReminder && !isReturn && !!tp[tripKey];
    const icon        = transitIcon(stop.driveBefore);
    const transit     = (!isReminder && stop.driveBefore && idx > 0)
      ? `<div class="transit-row"><span class="transit-dot"></span><span>${icon} ${stop.driveBefore}</span></div>`
      : '';
    return transit + `<div class="stop-card${isDone?' is-done':''}">
      <div class="sc-header">
        <div class="sc-time">${stop.t||'—'}${stop.duration?`<span class="sc-dur">${stop.duration}</span>`:''}</div>
        <div class="sc-icon-wrap ${stop.cls||''}">${stop.icon}</div>
        <div class="sc-title">${stop.name}</div>
        ${(!isReminder&&!isReturn)?`<button class="sc-done-btn${isDone?' done':''}" onclick="toggleTripActivity('${S.dest}',${day.n},${idx})" aria-label="${isDone?'Desmarcar concluído':'Marcar como concluído'}" title="${isDone?'Clique para desmarcar':'Marcar como feito'}">${isDone?'✓':''}</button>`:''}
      </div>
      ${stop.warn&&!isDone?`<div class="alert-warn">${stop.warn}</div>`:''}
      <div class="sc-details" id="sc-det-${idx}" hidden>
        ${stop.guide?`<p class="sc-guide">${stop.guide}</p>`:''}
        ${stop.notes?`<p class="sc-notes">${stop.notes}</p>`:''}
        ${stop.food?`<div class="sc-food">🍴 ${stop.food}</div>`:''}
      </div>
      <div class="sc-actions">
        ${hasNav&&!isDone?`<button class="sc-btn sc-btn-nav" onclick="navigateToStopByIdx(${idx})" aria-label="Navegar para ${stop.name}">Navegar</button>`:''}
        ${hasExtra?`<button class="sc-btn sc-btn-detail" onclick="toggleStopDetail(${idx})" id="sc-det-btn-${idx}" aria-expanded="false">+ Detalhes</button>`:''}
      </div>
    </div>`;
  }).join('');

  // 4. Reservas block (unchanged)
  if (day.res.length) {
    html += '<div class="day-res-block"><div class="day-res-title">📋 Reservas deste dia</div>';
    html += day.res.map(r => {
      const id=`${S.dest}_d${day.n}_${r.name.replace(/\W/g,'_')}`, done=!!ch[id];
      return `<div class="res-row"><div class="res-checkbox${done?' done':''}" onclick="toggleCheck('${id}')">${done?'✓':''}</div>
        <div class="res-text${done?' is-done':''}">${badgeHtml(r.prio)}
          <div class="res-name">${r.name}</div>
          <div class="res-how">${r.how}</div>
          <div class="res-obs">${r.obs}</div>
        </div></div>`;
    }).join('');
    html += '</div>';
  }
  document.getElementById('stop-cards').innerHTML = html;
}
function toggleStopDetail(idx) {
  const det=document.getElementById(`sc-det-${idx}`), btn=document.getElementById(`sc-det-btn-${idx}`);
  det.hidden=!det.hidden;
  btn.textContent=det.hidden?'+ Detalhes':'− Detalhes';
  btn.setAttribute('aria-expanded', !det.hidden);
}
function navigateToStopByIdx(idx) {
  const day=DEST[S.dest].days[S.dayIdx];
  navigateToStop(day.stops[idx]);
}

  const ch=getChecked(), filter=S.resFilter;

  const groups=[{prio:'red',label:'🔴 Urgente — fazer imediatamente'},{prio:'orange',label:'🟠 Alta prioridade'},{prio:'green',label:'🟢 Recomendado'}];

    <div class="view-title">📋 Checklist de Reservas</div>
    <div class="view-sub">6 pessoas · marque conforme reservar</div>

    <div class="progress-label">${done} de ${total} · ${pct}%</div>

    if (!items.length) return;
    html+=`<div class="res-group-hd" style="color:${gColor[g.prio]}">${g.label}</div>`;
    items.forEach(r => {
      const isDone=!!ch[r.id];
      html+=`<div class="big-res-card${isDone?' is-done':''}" >
        <div class="brc-check${isDone?' done':''}" onclick="toggleCheck('${r.id}')">${isDone?'✓':''}</div>
        <div class="brc-body${isDone?' is-done':''}" >
          <span class="brc-dest" style="background:${r.destColor}">${r.destName} · D${r.dayN} · ${r.dayDate}</span>
          <div class="brc-name">${r.name}</div>
          <div class="brc-how">${r.how}</div>
          <div class="brc-obs">${r.obs}</div>
        </div></div>`;
    });
  });
  html+=`<div class="alerts-box">
    <div class="alerts-box-title">⚠️ Atenções especiais</div>
    <div class="alert-line">· D5 Tenerife (seg): Mirador Garachico FECHADO às segundas</div>
    <div class="alert-line">· D6 Tenerife: Aeroporto TFN ≠ TFS (Sul)</div>
    <div class="alert-line">· D2 Madeira: Mercado — não comprar frutas no 1º piso</div>
    <div class="alert-line">· D8 Madeira: Pico Arieiro — verificar webcam: visitmadeira.pt</div>
    <div class="alert-line">· D3 Madrid: Templo Debod fecha segunda (sábado ✓)</div>
  </div></div>`;
  document.getElementById('view-reservas').innerHTML=html;
}

// ════════════════════════════════════════════════════════════
//  RENDER: GASTRONOMIA
// ════════════════════════════════════════════════════════════
function renderGastro() {
  const city = S.gastroCity, cat = S.gastroCat, prio = S.gastroPrio;

  const filtered = RESTAURANTS.filter(r =>
    (city==='all' || r.dest===city) &&
    (cat ==='all' || r.cat ===cat)  &&
    (prio==='all' || r.priority===prio)
  );

  function chips(key, opts, cur) {
    return opts.map(([v,l]) =>
      `<button class="gf-chip${cur===v?' active':''}" onclick="setGastroFilter('${key}','${v}')">${l}</button>`
    ).join('');
  }

  const html_city = chips('city',[['all','Todos'],['tenerife','🌋 Tenerife'],['madeira','🌿 Madeira'],['madrid','🏛️ Madrid']], city);
  const html_cat  = chips('cat', [['all','Todos'],['casual','Casual'],['jantar','Jantar bom'],['especial','Especial'],['poncha','Poncha/bar'],['cautela','⚠️ Cautela']], cat);
  const html_prio = chips('prio',[['all','Todas'],['alta','🔴 Alta'],['boa','Boa opção'],['alt','Alternativa']], prio);

  let html = `<div class="gastro-view">
    <div class="view-title">🍴 Gastronomia</div>
    <div class="view-sub">Comida boa, local e sem pega-turista</div>
    <p class="gastro-editorial">Curadoria focada em autenticidade, custo-benefício e experiência real. Não é uma lista de restaurantes de luxo.</p>
    <div class="gastro-filters">
      <div class="gastro-filter-row"><span class="gastro-filter-label">Cidade</span>${html_city}</div>
      <div class="gastro-filter-row"><span class="gastro-filter-label">Tipo</span>${html_cat}</div>
      <div class="gastro-filter-row"><span class="gastro-filter-label">Prioridade</span>${html_prio}</div>
    </div>
    <div class="gastro-count">${filtered.length} lugar${filtered.length!==1?'es':''}</div>`;

  if (!filtered.length) {
    html += `<div class="gastro-empty">Nenhum resultado — ajuste os filtros.</div>`;
  } else {
    const CAT_LBL  = {casual:'Casual',jantar:'Jantar bom',especial:'Especial s/ luxo',poncha:'Poncha/bar',cautela:'⚠️ Cautela'};
    const DEST_CLS = {tenerife:'dest-tf',madeira:'dest-md',madrid:'dest-ma'};
    const DEST_LBL = {tenerife:'Tenerife',madeira:'Madeira',madrid:'Madrid'};
    const BDG_MAP  = {reservar:['bdg-reservar','Reservar'],grupo:['bdg-grupo','Grupo'],poncha:['bdg-poncha','Poncha']};

    filtered.forEach(r => {
      const prioClass = r.cat==='cautela' ? 'cat-cautela' : {alta:'prio-alta',boa:'prio-boa',alt:'prio-alt'}[r.priority]||'';
      const badgesHtml = (r.badges||[]).map(b => {
        const [cls,lbl] = BDG_MAP[b]||['bdg-prio',b];
        return `<span class="rst-chip ${cls}">${lbl}</span>`;
      }).join('');
      const mapsQ = encodeURIComponent(r.name+' '+r.region);
      html += `<div class="rst-card ${prioClass}" id="rst-${r.id}">
        <div class="rst-header" onclick="toggleRestCard('${r.id}')">
          <div class="rst-name">${r.name}</div>
          <span class="rst-price">${r.price}</span>
          <span class="rst-chev">▼</span>
        </div>
        <div class="rst-meta">
          <span class="rst-chip ${DEST_CLS[r.dest]}">${DEST_LBL[r.dest]} · ${r.region}</span>
          <span class="rst-chip cat">${CAT_LBL[r.cat]||r.cat}</span>
          ${r.priority==='alta'?'<span class="rst-chip bdg-prio">🔴 Alta prioridade</span>':''}
          ${badgesHtml}
        </div>
        <div class="rst-body">
          <div class="rst-row"><span class="rst-row-label">Ocasião</span><span class="rst-row-val">${r.ocasiao}</span></div>
          <div class="rst-row"><span class="rst-row-label">O que pedir</span><span class="rst-row-val">${r.pedir}</span></div>
          <div class="rst-row"><span class="rst-row-label">Por que entrou</span><span class="rst-row-val">${r.porque}</span></div>
          ${r.obs?`<div class="rst-obs">💬 ${r.obs}</div>`:''}
          <button class="rst-maps-btn" onclick="window.open('https://www.google.com/maps/search/${mapsQ}','_blank')">🗺 Abrir no Maps</button>
        </div>
      </div>`;
    });
  }

  // ── SABORES LOCAIS ──
  const DEST_DISH_CLS = {tenerife:'dest-tf',madeira:'dest-md',madrid:'dest-ma'};
  const DEST_DISH_LBL = {tenerife:'🌋 Tenerife',madeira:'🌿 Madeira',madrid:'🏛️ Madrid'};
  const filteredDishes = DISHES.filter(d => city==='all' || d.dest===city);
  html += `<div class="dish-section">
    <div class="dish-section-title">🍽️ Sabores locais</div>
    <div class="dish-section-intro">Use esta seção para saber o que pedir. A ideia não é provar tudo, mas reconhecer os pratos que realmente fazem sentido em cada lugar.</div>
    <div class="dish-list">`;
  filteredDishes.forEach(d => {
    const dc = DEST_DISH_CLS[d.dest]||'';
    const dl = DEST_DISH_LBL[d.dest]||d.dest;
    html += `<div class="dish-card ${dc}">
      <div class="dish-header">
        <span class="dish-emoji">${d.emoji}</span>
        <span class="dish-name">${d.name}</span>
        <span class="rst-chip ${dc}" style="font-size:10px;padding:2px 7px;flex-shrink:0;">${dl}</span>
      </div>
      <div class="dish-desc">${d.desc}</div>
      <div class="dish-rows">
        <div class="dish-row"><span class="dish-row-lbl">Como vem</span><span class="dish-row-val">${d.como}</span></div>
        <div class="dish-row"><span class="dish-row-lbl">Por que</span><span class="dish-row-val">${d.porque}</span></div>
        <div class="dish-row"><span class="dish-row-lbl">Provar em</span><span class="dish-row-val">${d.provar}</span></div>
      </div>
      ${d.warn?`<div class="dish-warn">${d.warn}</div>`:''}
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="antitrap-box">
    <div class="antitrap-title">🚨 Como evitar pega-turista</div>
    <div class="antitrap-list">Sinais de alerta:<br>
      · Cardápio enorme em muitos idiomas<br>
      · Fotos grandes de comida na porta<br>
      · Promoter chamando na rua<br>
      · Localização premium com comida genérica<br>
      · Paella servida em qualquer horário e lugar<br>
      · Restaurante vazio em rua muito turística<br>
      · Nota alta com avaliações muito genéricas
    </div>
    <div class="antitrap-rule">"Se o lugar tem cardápio curto, pratos locais, movimento de moradores e não tenta vender demais, tende a ser melhor."</div>
  </div></div>`;

  document.getElementById('view-gastro').innerHTML = html;
}
function setGastroFilter(key, val) {
  if (key==='city') S.gastroCity=val;
  else if (key==='cat') S.gastroCat=val;
  else if (key==='prio') S.gastroPrio=val;
  renderGastro();
}
function toggleRestCard(id) {
  const c = document.getElementById('rst-'+id);
  if (c) c.classList.toggle('open');
}


// ════════════════════════════════════════════════════════════
//  RENDER: PRÉ-VIAGEM
// ════════════════════════════════════════════════════════════
function renderPreTrip() {
  const checked      = getPretripChecked();
  // Excluir itens informativos (type:'info') do progresso
  const checkItems   = PRETRIP_CATEGORIES.flatMap(c => c.items.filter(i => !i.type));
  const total        = checkItems.length;
  const done         = checkItems.filter(i => checked[i.id]).length;
  const pct          = total ? Math.round(done/total*100) : 0;
  let html = `<div class="pre-view">
    <div class="view-title">✅ Pré-viagem</div>
    <div class="view-sub">Checklist completo · marque conforme for preparando</div>
    <div class="pre-progress-wrap"><div class="pre-progress-bar" style="width:${pct}%"></div></div>
    <div class="pre-progress-label">${done} de ${total} itens concluídos · ${pct}%</div>`;
  PRETRIP_CATEGORIES.forEach(cat => {
    const checkable   = cat.items.filter(i => !i.type);
    const catDone     = checkable.filter(i => checked[i.id]).length;
    const allDone     = checkable.length > 0 && catDone === checkable.length;
    // Iniciar colapsado se cat.collapsed e nenhum item marcado
    const startOpen   = !cat.collapsed || checkable.some(i => checked[i.id]);
    html += `<div class="pre-category">
      <div class="pre-cat-hd" onclick="togglePreCategory('${cat.id}')" aria-expanded="${startOpen}" id="pre-cat-hd-${cat.id}">
        <span class="pre-cat-icon">${cat.icon}</span>
        <span class="pre-cat-label">${cat.label}</span>
        <span class="pre-cat-count${allDone?' has-all':''}">${catDone}/${checkable.length}</span>
        <span class="pre-cat-chev">▼</span>
      </div>
      <div class="pre-items" id="pre-items-${cat.id}"${startOpen?'':' style="display:none"'}>`;
    cat.items.forEach(item => {
      if (item.type === 'info') {
        // Item informativo — sem checkbox
        html += `<div class="pre-item is-info">
          <div class="pre-info-icon">ℹ</div>
          <div class="pre-item-body">
            <div class="pre-item-label">${item.label}</div>
            ${item.note?`<div class="pre-item-note">${item.note}</div>`:''}
          </div>
        </div>`;
        return;
      }
      const isDone      = !!checked[item.id];
      const extraClass  = (item.highlight?' is-highlight':'') + (item.optional?' is-optional':'');
      html += `<div class="pre-item${isDone?' is-done':''}${extraClass}">
        <div class="pre-check${isDone?' done':''}" onclick="togglePretripCheck('${item.id}')">${isDone?'✓':''}</div>
        <div class="pre-item-body">
          <div class="pre-item-label">${item.label}</div>
          ${item.note?`<div class="pre-item-note">${item.note}</div>`:''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  document.getElementById('view-pretrip').innerHTML = html;
}
function togglePreCategory(catId) {
  const hd    = document.getElementById('pre-cat-hd-'+catId);
  const items = document.getElementById('pre-items-'+catId);
  const expanded = hd.getAttribute('aria-expanded') === 'true';
  hd.setAttribute('aria-expanded', String(!expanded));
  items.style.display = expanded ? 'none' : '';
}

// ════════════════════════════════════════════════════════════
//  VIEW SWITCHER
// ════════════════════════════════════════════════════════════
function showView(view) {
  document.getElementById('view-itinerary').style.display = view==='itinerary'?'flex':'none';
  document.getElementById('view-reservas').style.display  = view==='reservas'?'block':'none';
  document.getElementById('view-gastro').style.display    = view==='gastro'?'block':'none';
  document.getElementById('view-pretrip').style.display   = view==='pretrip'?'block':'none';
  document.getElementById('view-fotos').style.display     = view==='fotos'?'block':'none';
  document.getElementById('sidebar').style.display        = view==='itinerary'?'':'none';
  const cw = document.getElementById('day-chips-wrap');
  if (cw) cw.style.display = view==='itinerary'?'':'none';
  document.getElementById('bottom-bar').style.display     = view==='itinerary'?'':'none';
}

function switchDest(destId) {
  if (destId==='reservas') {
    S.dest='reservas'; S.view='reservas'; applyTheme('tenerife');
    showView('reservas'); renderReservas();
  } else if (destId==='gastro') {
    S.dest='gastro'; S.view='gastro'; applyTheme('tenerife');
    showView('gastro'); renderGastro();
  } else if (destId==='pretrip') {
    S.dest='pretrip'; S.view='pretrip';
    const r = document.documentElement;
    r.style.setProperty('--dest','#0EA5E9');
    r.style.setProperty('--dest-l','#F0F9FF');
    r.style.setProperty('--dest-b','#BAE6FD');
    showView('pretrip'); renderPreTrip();
  } else if (destId==='fotos') {
    S.dest='fotos'; S.view='fotos';
    showView('fotos'); renderPhotosView();
  } else {
    S.dest=destId; S.dayIdx=0; S.view='itinerary';
    applyTheme(destId); showView('itinerary');
    renderDayChips(); renderSidebar();
    renderDayHeaderCard(); renderStopCards();
    if (!S.mapCollapsed) updateMap();
  }
  renderTabs();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function switchDay(idx) {
  S.dayIdx=idx;
  renderDayChips(); renderSidebar();
  renderDayHeaderCard(); renderStopCards();
  if (!S.mapCollapsed) updateMap();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function setResFilter(f) { S.resFilter=f; renderReservas(); }
function closeSidebar()  {}  // no mobile sidebar in v2

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Inicializar Supabase (SDK carregado via defer, já disponível no DOMContentLoaded)
  if (SUPABASE_OK && window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  applyTheme('tenerife');
  renderTabs();
  renderDayChips();
  renderSidebar();
  renderDayHeaderCard();
  renderStopCards();
  showView('itinerary');

  // Auth — não bloqueia a renderização do itinerário
  initAuth(); // async sem await intencional: auth é background
  // Map starts collapsed; Leaflet is initialised lazily when user opens it
});
</script>
