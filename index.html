<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌍 Família Solon · Jun 2025</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ─── RESET & TOKENS ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-tf: #EA580C; --c-tf-l: #FFF7ED; --c-tf-b: #FED7AA;
  --c-md: #16A34A; --c-md-l: #F0FDF4; --c-md-b: #BBF7D0;
  --c-ma: #DC2626; --c-ma-l: #FEF2F2; --c-ma-b: #FECACA;
  --c-res: #4F46E5; --c-gas: #7C3AED;
  --c-red: #EF4444; --c-orange: #F97316; --c-green: #22C55E;
  --g0: #FFFFFF; --g50: #F8FAFC; --g100: #F1F5F9; --g200: #E2E8F0;
  --g300: #CBD5E1; --g400: #94A3B8; --g500: #64748B; --g700: #334155; --g900: #0F172A;
  --header-h: 56px;
  --sidebar-w: 228px;
  --radius: 10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  /* active destination theming – overridden by JS */
  --dest: var(--c-tf); --dest-l: var(--c-tf-l); --dest-b: var(--c-tf-b);
}
html { scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
       background: var(--g50); color: var(--g900); min-height: 100vh; font-size: 14px; line-height: 1.5; }
button { cursor: pointer; font-family: inherit; }

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 500;
  height: var(--header-h); background: var(--g0);
  border-bottom: 1px solid var(--g200);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 0; padding: 0 12px 0 0;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px; height: 100%; border-right: 1px solid var(--g200);
  font-weight: 800; font-size: 15px; white-space: nowrap; color: var(--g900);
  text-decoration: none; flex-shrink: 0;
}
.brand-icon { font-size: 22px; }
#menu-btn {
  display: none; background: none; border: none;
  padding: 8px 12px; font-size: 20px; color: var(--g700); flex-shrink: 0;
}
.dest-tabs { display: flex; gap: 2px; padding: 0 8px; overflow-x: auto; scrollbar-width: none; flex: 1; }
.dest-tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 5px; padding: 6px 14px;
  border: none; border-radius: 8px; background: none; color: var(--g500);
  font-size: 13px; font-weight: 600; white-space: nowrap; transition: background .15s, color .15s;
  position: relative;
}
.tab:hover { background: var(--g100); color: var(--g900); }
.tab.active { color: #fff; }
.tab[data-dest="tenerife"].active  { background: var(--c-tf); }
.tab[data-dest="madeira"].active   { background: var(--c-md); }
.tab[data-dest="madrid"].active    { background: var(--c-ma); }
.tab[data-dest="reservas"].active  { background: var(--c-res); }
.tab[data-dest="gastro"].active    { background: var(--c-gas); }
.tab-badge {
  position: absolute; top: 3px; right: 3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c-red); border: 2px solid var(--g0);
}

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  height: calc(100vh - var(--header-h));
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--g0); border-right: 1px solid var(--g200);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform .22s ease;
}
.sidebar-dest {
  padding: 12px 14px; border-bottom: 1px solid var(--g100);
  flex-shrink: 0;
}
.sidebar-dest-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--dest); margin-bottom: 2px;
}
.sidebar-dest-base { font-size: 11px; color: var(--g500); line-height: 1.4; }
#day-list { overflow-y: auto; flex: 1; scrollbar-width: thin; }
#day-list::-webkit-scrollbar { width: 4px; }
#day-list::-webkit-scrollbar-thumb { background: var(--g200); border-radius: 2px; }
.day-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--g100);
  cursor: pointer; transition: background .1s;
}
.day-row:hover { background: var(--g50); }
.day-row.active { background: var(--dest-l); }
.day-num-badge {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--g100); color: var(--g700);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  transition: background .15s, color .15s;
}
.day-row.active .day-num-badge { background: var(--dest); color: #fff; }
.day-row-body { flex: 1; min-width: 0; }
.day-row-title { font-size: 12px; font-weight: 600; color: var(--g900);
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-row-date  { font-size: 11px; color: var(--g500); }
.day-row-pips  { display: flex; gap: 3px; margin-top: 3px; }
.pip { width: 6px; height: 6px; border-radius: 50%; }
.pip-red    { background: var(--c-red); }
.pip-orange { background: var(--c-orange); }
.pip-green  { background: var(--c-green); }

/* ─── MAIN CONTENT ─── */
#main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ─── ITINERARY VIEW ─── */
#view-itinerary { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

/* Day header */
#day-header {
  flex-shrink: 0; padding: 16px 20px 14px; background: var(--g0);
  border-bottom: 1px solid var(--g200);
}
.dh-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--dest); color: #fff;
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  margin-bottom: 8px;
}
.dh-title { font-size: 22px; font-weight: 800; line-height: 1.2; color: var(--g900); }
.dh-date  { font-size: 13px; color: var(--g500); margin-top: 2px; }
.dh-summary {
  margin-top: 10px; padding: 9px 13px; border-radius: 8px;
  background: var(--dest-l); border-left: 3px solid var(--dest);
  font-size: 13px; color: var(--g700); line-height: 1.5;
}
.flight-strip {
  margin: 10px 20px 0; padding: 9px 14px;
  background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
  border: 1px solid #BFDBFE; border-radius: 8px;
  display: flex; align-items: center; gap: 10px;
}
.flight-strip-icon { font-size: 18px; }
.flight-strip-text { font-size: 12px; font-weight: 600; color: #1E40AF; line-height: 1.4; }

/* Map section */
#map-section {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--g100); border-bottom: 1px solid var(--g200);
}
#map { height: 250px; width: 100%; transition: height .3s ease; flex-shrink: 0; }
#map-section.collapsed #map { height: 0; }

/* Barra de ação: Google Maps · Waze · toggle */
.map-action-bar {
  display: flex; align-items: stretch; gap: 8px;
  padding: 8px 12px; flex-shrink: 0;
  background: var(--g0); border-top: 1px solid var(--g200);
}
.map-nav-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  min-height: 44px;
  background: var(--g50); border: 1px solid var(--g200);
  border-radius: 8px;
  font-size: 13px; font-weight: 600; color: var(--g700);
  transition: background .1s;
}
.map-nav-btn:hover, .map-nav-btn:active { background: var(--g100); }
#map-toggle-btn {
  flex-shrink: 0;
  min-height: 44px; padding: 0 12px;
  background: none; border: 1px solid var(--g200);
  border-radius: 8px;
  font-size: 12px; font-weight: 600; color: var(--g500);
  white-space: nowrap; transition: background .1s;
}
#map-toggle-btn:hover, #map-toggle-btn:active { background: var(--g100); }

/* Timeline scroll area */
#timeline-wrap { flex: 1; overflow-y: auto; padding: 16px 20px 40px; }
.tl-inner { max-width: 640px; }

/* Timeline stops */
.tl-stop { display: flex; gap: 12px; position: relative; }
.tl-stop:not(:last-child)::before {
  content: ''; position: absolute;
  left: 17px; top: 40px; bottom: 0; width: 2px;
  background: var(--g200); z-index: 0;
}
.tl-icon-col { width: 36px; flex-shrink: 0; padding-top: 8px; z-index: 1; }
.tl-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--g0); border: 2px solid var(--g200);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; box-shadow: var(--shadow-sm);
}
.tl-icon.is-dinner, .tl-icon.is-lunch {
  border-color: var(--dest); background: var(--dest-l);
}
.tl-icon.is-transport { border-color: var(--g300); background: var(--g50); }
.tl-body { flex: 1; padding: 8px 0 22px; min-width: 0; }
.tl-time { font-size: 11px; font-weight: 700; color: var(--g500); letter-spacing: .04em; margin-bottom: 2px; }
.tl-name { font-size: 15px; font-weight: 700; color: var(--g900); line-height: 1.3; }
.tl-notes { font-size: 12px; color: #475569; margin-top: 4px; line-height: 1.55; }
.tl-food {
  margin-top: 6px; padding: 6px 10px; border-radius: 6px;
  background: var(--g50); border-left: 3px solid var(--dest);
  font-size: 12px; color: var(--g700);
}
.tl-warn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 5px 10px; border-radius: 6px;
  background: #FFFBEB; border: 1px solid #FDE68A;
  font-size: 11px; font-weight: 600; color: #92400E;
}

/* Day reservations block */
.day-res-block {
  margin-top: 4px; padding: 14px;
  background: var(--g0); border: 1px solid var(--g200); border-radius: var(--radius);
}
.day-res-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--g500); margin-bottom: 10px;
}
.res-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; }
.res-row + .res-row { border-top: 1px solid var(--g100); }
.res-checkbox {
  width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0; margin-top: 2px;
  border: 2px solid var(--g300); background: var(--g0); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; transition: all .15s;
}
.res-checkbox.done { background: var(--c-green); border-color: var(--c-green); }
.res-text { flex: 1; min-width: 0; }
.res-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; margin-bottom: 3px;
}
.badge-red    { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
.badge-orange { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.badge-green  { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
.res-name  { font-size: 14px; font-weight: 700; color: var(--g900); }
.res-how   { font-size: 12px; color: var(--g700); margin-top: 2px; }
.res-obs   { font-size: 11px; color: var(--g500); margin-top: 1px; font-style: italic; }
.res-text.is-done .res-name,
.res-text.is-done .res-how,
.res-text.is-done .res-obs { opacity: .45; text-decoration: line-through; }

/* Food summary */
.food-block {
  margin-top: 12px; padding: 12px 14px;
  background: var(--g50); border: 1px solid var(--g200); border-radius: var(--radius);
}
.food-block-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--g500); margin-bottom: 8px;
}
.food-line { display: flex; gap: 7px; align-items: flex-start; padding: 3px 0; font-size: 12px; color: var(--g700); }
.food-line-icon { flex-shrink: 0; }

/* ─── FULL VIEWS (Reservas + Gastro) ─── */
#view-reservas, #view-gastro {
  display: none; flex: 1; overflow-y: auto; padding: 20px;
}
.view-title { font-size: 20px; font-weight: 800; color: var(--g900); }
.view-sub   { font-size: 13px; color: var(--g500); margin-top: 2px; margin-bottom: 20px; }

/* RESERVAS */
.progress-wrap { background: var(--g200); border-radius: 20px; height: 6px; margin-bottom: 4px; overflow: hidden; }
.progress-bar  { height: 100%; background: var(--c-green); border-radius: 20px; transition: width .4s; }
.progress-label { font-size: 11px; color: var(--g500); text-align: right; margin-bottom: 16px; }
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.filt-btn {
  border: 2px solid var(--g200); background: var(--g0); border-radius: 20px;
  padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--g700);
  transition: all .15s;
}
.filt-btn:hover { border-color: var(--g300); }
.filt-btn.f-all    { background: var(--g900); color: #fff; border-color: var(--g900); }
.filt-btn.f-red    { background: var(--c-red); color: #fff; border-color: var(--c-red); }
.filt-btn.f-orange { background: var(--c-orange); color: #fff; border-color: var(--c-orange); }
.filt-btn.f-green  { background: var(--c-green); color: #fff; border-color: var(--c-green); }
.res-group-hd {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700; margin: 20px 0 8px;
}
.big-res-card {
  background: var(--g0); border: 1px solid var(--g200); border-radius: var(--radius);
  padding: 13px 14px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 12px;
  transition: opacity .2s;
}
.big-res-card.is-done { opacity: .5; }
.brc-check {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; margin-top: 2px;
  border: 2px solid var(--g300); background: var(--g0); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; transition: all .15s;
}
.brc-check.done { background: var(--c-green); border-color: var(--c-green); }
.brc-body { flex: 1; min-width: 0; }
.brc-dest { display: inline-block; font-size: 10px; font-weight: 700; color: #fff;
            padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; }
.brc-name { font-size: 14px; font-weight: 700; color: var(--g900); }
.brc-how  { font-size: 12px; color: var(--g700); margin-top: 3px; }
.brc-obs  { font-size: 11px; color: var(--g500); margin-top: 2px; font-style: italic; }
.brc-body.is-done .brc-name,
.brc-body.is-done .brc-how,
.brc-body.is-done .brc-obs { text-decoration: line-through; }
.alerts-box {
  margin-top: 20px; padding: 14px; border-radius: var(--radius);
  background: #FFFBEB; border: 1px solid #FDE68A;
}
.alerts-box-title { font-size: 12px; font-weight: 700; color: #92400E; margin-bottom: 8px; }
.alert-line { font-size: 12px; color: #78350F; line-height: 1.6; }

/* GASTRO */
.gastro-section { margin-bottom: 28px; }
.gastro-hd {
  font-size: 16px; font-weight: 800; color: var(--g900);
  padding-bottom: 8px; margin-bottom: 12px;
  border-bottom: 2px solid currentColor;
  display: flex; align-items: center; gap: 7px;
}
.dish-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 8px; }
.dish-card {
  background: var(--g0); border: 1px solid var(--g200); border-radius: 8px;
  padding: 11px 12px; border-left: 3px solid;
}
.dish-name  { font-size: 13px; font-weight: 700; color: var(--g900); }
.dish-desc  { font-size: 11px; color: #475569; margin-top: 3px; line-height: 1.4; }
.dish-where { font-size: 10px; font-weight: 700; margin-top: 5px; }
.strategy-box {
  margin-top: 8px; padding: 14px; border-radius: var(--radius);
  background: var(--g0); border: 1px solid var(--g200);
}
.strategy-box-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.strategy-line { font-size: 12px; color: var(--g700); line-height: 2; }

/* ─── LEAFLET OVERRIDES ─── */
.leaflet-popup-content-wrapper {
  border-radius: var(--radius); font-family: inherit; box-shadow: var(--shadow-md);
}
.leaflet-popup-content { margin: 10px 14px !important; }
.popup-time { font-size: 11px; font-weight: 700; color: var(--g500); }
.popup-name { font-size: 14px; font-weight: 700; color: var(--g900); margin-top: 1px; }
.popup-note { font-size: 11px; color: #475569; margin-top: 3px; line-height: 1.4; max-width: 200px; }

/* ─── OVERLAY ─── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 450;
}
#overlay.show { display: block; }

/* ─── RESPONSIVE ─── */
@media (max-width: 720px) {
  #menu-btn { display: block; }
  .brand-text { display: none; }
  #sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: 0;
    z-index: 490; transform: translateX(-100%);
    box-shadow: none;
  }
  #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.18); }
  .layout { height: calc(100dvh - var(--header-h)); }
  #map { height: 200px; }
  #view-reservas, #view-gastro { padding: 14px; }
  .dish-grid { grid-template-columns: 1fr; }
  .dh-title { font-size: 19px; }
}
@media (min-width: 721px) {
  .brand { min-width: var(--sidebar-w); }
}
</style>
</head>
<body>

<header>
  <a class="brand" href="#" onclick="return false">
    <span class="brand-icon">🌍</span>
    <span class="brand-text">Família Solon · Jun 2025</span>
  </a>
  <button id="menu-btn" onclick="toggleSidebar()">☰</button>
  <nav class="dest-tabs" id="destTabs"></nav>
</header>

<div id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-dest">
      <div class="sidebar-dest-label" id="sdLabel"></div>
      <div class="sidebar-dest-base" id="sdBase"></div>
    </div>
    <div id="day-list"></div>
  </aside>

  <main id="main">
    <div id="view-itinerary">
      <div id="day-header"></div>
      <div id="map-section">
        <div id="map"></div>
        <div class="map-action-bar">
          <button class="map-nav-btn" onclick="openGoogleMaps()">🗺️ Google Maps</button>
          <button class="map-nav-btn" onclick="openWaze()">🚗 Waze</button>
          <button id="map-toggle-btn" onclick="toggleMap()">▲ Ocultar</button>
        </div>
      </div>
      <div id="timeline-wrap"><div class="tl-inner" id="timeline"></div></div>
    </div>
    <div id="view-reservas"></div>
    <div id="view-gastro"></div>
  </main>
</div>

<script>
'use strict';
// ════════════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════════════
const DEST = {
  tenerife: {
    name:'Tenerife', emoji:'🌋', tab:'🌋 Tenerife',
    dates:'04–09 jun', nights:'5 noites',
    color:'#EA580C', light:'#FFF7ED', border:'#FED7AA',
    mapCenter:[28.18,-16.70], mapZoom:10,
    base:'Airbnb Palm-Mar · Av. el Palm-Mar / C. los Falcones · Carro alugado em TFN',
    days:[
      { n:1, date:'04 jun', wd:'Quinta', title:'Chegada',
        summary:'Pouso TFN 15:40 → supermercado → check-in → Montaña Amarilla → jantar Los Abrigos',
        flight:{route:'MAD → TFN', dep:'13:50', arr:'15:40', num:'—', info:'2h50 direto'},
        stops:[
          {t:'15:40', name:'Aeroporto TFN', icon:'✈️', cls:'is-transport',
           lat:28.4827, lng:-16.3415, notes:'Retirar carro. ⚠️ TFN = Tenerife Norte — NÃO é o TFS (Sul)'},
          {t:'16:30', name:'Supermercado Los Cristianos', icon:'🛒', cls:'',
           lat:28.023, lng:-16.698, notes:'Mercadona ou Hiperdino. Comprar café, pão, frios e frutas para todos os dias de Tenerife'},
          {t:'17:00', name:'Airbnb Palm-Mar', icon:'🏠', cls:'',
           lat:28.023, lng:-16.698, notes:'Check-in · Av. el Palm-Mar / C. los Falcones'},
          {t:'17:30', name:'Montaña Amarilla', icon:'🌋', cls:'',
           lat:28.011, lng:-16.636, notes:'Formação vulcânica amarela icônica. Caminhada curtíssima (<1km). Pôr do sol às 21h30'},
          {t:'19:30', name:'Jantar · Los Abrigos', icon:'🍽️', cls:'is-dinner',
           lat:28.0235, lng:-16.7065,
           notes:'Vila de pescadores. Peixe fresco grelhado, papas arrugadas, mojo verde/vermelho. Sem reserva. ~€15-20/pess',
           food:'Peixe grelhado fresco · papas arrugadas · mojo verde e vermelho · vinho local'},

//  MAP
// ════════════════════════════════════════════════════════════
let leafMap = null;
let mapLayers = [];

function ensureMap() {
  if (leafMap) return;
  leafMap = L.map('map', { zoomControl: true, attributionControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(leafMap);
}

function clearMapLayers() {
  mapLayers.forEach(l => l.remove());
  mapLayers = [];
}

function updateMap() {
  ensureMap();
  clearMapLayers();

  const dest = DEST[S.dest];
  const day  = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));

  if (!pts.length) {
    leafMap.setView(dest.mapCenter, dest.mapZoom);
    setTimeout(() => leafMap.invalidateSize(), 120);
    return;
  }

  // Route polyline
  const latlngs = pts.map(p => [p.lat, p.lng]);
  const line = L.polyline(latlngs, {
    color: dest.color, weight: 3, opacity: .65, dashArray: '8,5'
  }).addTo(leafMap);
  mapLayers.push(line);

  // Markers with numbered pins
  pts.forEach((stop, i) => {
    const html = `
      <div style="position:relative;display:flex;flex-direction:column;align-items:center">
        <div style="
          width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
          background:${dest.color};border:2px solid #fff;
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 2px 6px rgba(0,0,0,.28)">
          <span style="transform:rotate(45deg);font-size:13px">${stop.icon}</span>
        </div>
        <div style="
          background:#fff;padding:1px 5px;border-radius:4px;
          font-size:9px;font-weight:700;margin-top:2px;
          box-shadow:0 1px 3px rgba(0,0,0,.2);
          max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
          color:${dest.color};">${i+1}. ${stop.name.split('·')[0].trim()}</div>
      </div>`;
    const icon = L.divIcon({ html, className:'', iconSize:[36,52], iconAnchor:[16,46] });
    const m = L.marker([stop.lat, stop.lng], { icon }).addTo(leafMap);
    m.bindPopup(`
      <div class="popup-time">${stop.t || ''}</div>
      <div class="popup-name">${stop.name}</div>
      <div class="popup-note">${stop.notes || ''}</div>`);
    mapLayers.push(m);
  });

  const bounds = L.latLngBounds(latlngs);
  leafMap.fitBounds(bounds, { padding: [32, 32], maxZoom: 14 });
  setTimeout(() => leafMap.invalidateSize(), 120);
}

function toggleMap() {
  S.mapCollapsed = !S.mapCollapsed;
  const sec = document.getElementById('map-section');
  const btn = document.getElementById('map-toggle-btn');
  sec.classList.toggle('collapsed', S.mapCollapsed);
  btn.textContent = S.mapCollapsed ? '▼ Ver mapa' : '▲ Ocultar';
  if (!S.mapCollapsed) setTimeout(() => leafMap && leafMap.invalidateSize(), 320);
}

function buildGoogleMapsUrl() {
  const dest = DEST[S.dest];
  const day  = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!pts.length) return null;

  // Limpa o nome do ponto para exibir no Google Maps (remove emoji, prefixos de refeição etc.)
  function toName(stop) {
    let n = stop.name
      .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')   // emoji plano suplementar
      .replace(/[☀-➿️]/g, '')     // símbolos misc + variation selector
      .trim();
    n = n.replace(/^(jantar|almoço|café|bar|lanche)\s*·\s*/i, ''); // "Jantar · Restaurante" → "Restaurante"
    n = n.replace(/^(check-out|check-in)\s+/i, '');                // "Check-out Airbnb" → "Airbnb"
    if (n.includes('·')) n = n.split('·')[0].trim();               // "Los Gigantes · Falésias" → "Los Gigantes"
    if (!n) n = dest.name;
    return encodeURIComponent(`${n} ${dest.name}`);
  }

  if (pts.length === 1)
    return `https://www.google.com/maps/dir/?api=1&destination=${toName(pts[0])}&travelmode=driving`;

  // Sem 'origin' → Maps usa localização GPS atual como ponto de partida
  const dst = toName(pts[pts.length-1]);
  const wp  = pts.slice(0,-1).map(toName).join('|');  // todos os pontos viram waypoints
  let url = `https://www.google.com/maps/dir/?api=1&destination=${dst}&travelmode=driving`;
  if (wp) url += `&waypoints=${wp}`;
  return url;
}

function buildWazeUrl() {
  const dest = DEST[S.dest];
  const day  = dest.days[S.dayIdx];
  const pts  = day.stops.filter(s => s.lat && s.lng && !s.name.startsWith('🎒'));
  if (!pts.length) return null;
  // Waze não suporta multi-stop via URL — abre no 1º ponto do dia
  return `https://waze.com/ul?ll=${pts[0].lat},${pts[0].lng}&navigate=yes&zoom=17`;
}

function openGoogleMaps() { const u = buildGoogleMapsUrl(); if (u) window.open(u, '_blank'); }
function openWaze()        { const u = buildWazeUrl();        if (u) window.open(u, '_blank'); }

// ════════════════════════════════════════════════════════════
//  CHECKLIST (localStorage)
// ════════════════════════════════════════════════════════════
function getChecked() {
  try { return JSON.parse(localStorage.getItem('res_checked') || '{}'); } catch { return {}; }
}
function setChecked(id, val) {
  const d = getChecked();
  val ? (d[id] = 1) : delete d[id];
  localStorage.setItem('res_checked', JSON.stringify(d));
}
function toggleCheck(id) {
  const ch = getChecked();
  setChecked(id, !ch[id]);
  // Re-render whichever view is active
  if (S.view === 'itinerary') renderTimeline();
  else if (S.view === 'reservas') renderReservas();
}

// ════════════════════════════════════════════════════════════
//  CSS-VAR THEME HELPER
// ════════════════════════════════════════════════════════════
function applyTheme(destId) {
  const d = DEST[destId] || {};
  const r = document.documentElement;
  r.style.setProperty('--dest',   d.color || '#EA580C');
  r.style.setProperty('--dest-l', d.light || '#FFF7ED');
  r.style.setProperty('--dest-b', d.border || '#FED7AA');
}

// ════════════════════════════════════════════════════════════
//  RENDER: TABS
// ════════════════════════════════════════════════════════════
function renderTabs() {
  const tabs = [
    { id:'tenerife', label:'🌋 Tenerife' },
    { id:'madeira',  label:'🌿 Madeira'  },
    { id:'madrid',   label:'🏛️ Madrid'   },
    { id:'reservas', label:'📋 Reservas' },
    { id:'gastro',   label:'🍴 Gastronomia' },
  ];
  const ch = getChecked();
  const unchecked = ALL_RES.filter(r => !ch[r.id] && r.prio === 'red').length;
  document.getElementById('destTabs').innerHTML = tabs.map(t => {
    const active = S.dest === t.id ? ' active' : '';
    const badge = (t.id === 'reservas' && unchecked > 0)
      ? `<span class="tab-badge"></span>` : '';
    return `<button class="tab${active}" data-dest="${t.id}" onclick="switchDest('${t.id}')">${t.label}${badge}</button>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════
//  RENDER: SIDEBAR
// ════════════════════════════════════════════════════════════
function renderSidebar() {
  const dest = DEST[S.dest];
  if (!dest) { document.getElementById('day-list').innerHTML = ''; return; }
  document.getElementById('sdLabel').textContent = `${dest.emoji} ${dest.name} · ${dest.dates}`;
  document.getElementById('sdBase').textContent  = dest.base;
  document.getElementById('day-list').innerHTML = dest.days.map((day, i) => {
    const hasR = day.res.some(r => r.prio === 'red');
    const hasO = day.res.some(r => r.prio === 'orange');
    const hasG = day.res.some(r => r.prio === 'green');
    const pips = [
      hasR ? '<span class="pip pip-red"></span>'    : '',
      hasO ? '<span class="pip pip-orange"></span>' : '',
      hasG ? '<span class="pip pip-green"></span>'  : '',
    ].join('');
    return `<div class="day-row${S.dayIdx === i ? ' active' : ''}" onclick="switchDay(${i})">
      <div class="day-num-badge">${day.n}</div>
      <div class="day-row-body">
        <div class="day-row-title">${day.title}</div>
        <div class="day-row-date">${day.wd} · ${day.date}</div>
        ${pips ? `<div class="day-row-pips">${pips}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════
//  RENDER: DAY HEADER
// ════════════════════════════════════════════════════════════
function renderDayHeader() {
  const dest = DEST[S.dest];
  const day  = dest.days[S.dayIdx];
  const el   = document.getElementById('day-header');
  let html = `
    <div class="dh-pill">${dest.emoji} ${dest.name} · Dia ${day.n}</div>
    <div class="dh-title">${day.title}</div>
    <div class="dh-date">${day.wd}, ${day.date} · ${dest.dates}</div>
    <div class="dh-summary">${day.summary}</div>`;
  if (day.flight) {
    html += `<div class="flight-strip">
      <span class="flight-strip-icon">✈️</span>
      <div class="flight-strip-text">
        VOO ${day.flight.route} · ${day.flight.dep} → ${day.flight.arr} · ${day.flight.num} · ${day.flight.info}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  RENDER: TIMELINE
// ════════════════════════════════════════════════════════════
function badgeHtml(prio) {
  if (prio === 'red')    return '<span class="res-badge badge-red">🔴 URGENTE</span>';
  if (prio === 'orange') return '<span class="res-badge badge-orange">🟠 ALTA PRIORIDADE</span>';
  return '<span class="res-badge badge-green">🟢 RECOMENDADO</span>';
}

function renderTimeline() {
  const dest = DEST[S.dest];
  const day  = dest.days[S.dayIdx];
  const ch   = getChecked();
  let html   = '';

  // Stops
  html += day.stops.map(stop => `
    <div class="tl-stop">
      <div class="tl-icon-col">
        <div class="tl-icon ${stop.cls || ''}">${stop.icon}</div>
      </div>
      <div class="tl-body">
        <div class="tl-time">${stop.t || ''}</div>
        <div class="tl-name">${stop.name}</div>
        ${stop.notes ? `<div class="tl-notes">${stop.notes}</div>` : ''}
        ${stop.warn  ? `<div class="tl-warn">${stop.warn}</div>` : ''}
        ${stop.food  ? `<div class="tl-food">🍴 ${stop.food}</div>` : ''}
      </div>
    </div>`).join('');

  // Reservations block
  if (day.res.length) {
    html += `<div class="day-res-block">
      <div class="day-res-title">📋 Reservas deste dia</div>`;
    html += day.res.map(r => {
      const id   = `${S.dest}_d${day.n}_${r.name.replace(/\W/g,'_')}`;
      const done = !!ch[id];
      return `<div class="res-row">
        <div class="res-checkbox${done ? ' done' : ''}" onclick="toggleCheck('${id}')">${done ? '✓' : ''}</div>
        <div class="res-text${done ? ' is-done' : ''}">
          ${badgeHtml(r.prio)}
          <div class="res-name">${r.name}</div>
          <div class="res-how">${r.how}</div>
          <div class="res-obs">${r.obs}</div>
        </div>
      </div>`;
    }).join('');
    html += '</div>';
  }

  // Food summary
  if (day.foodLines && day.foodLines.length) {
    html += `<div class="food-block">
      <div class="food-block-title">🍽️ Alimentação do dia</div>`;
    html += day.foodLines.map(f =>
      `<div class="food-line"><span class="food-line-icon">${f.i}</span><span>${f.t}</span></div>`
    ).join('');
    html += '</div>';
  }

  document.getElementById('timeline').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  RENDER: RESERVAS
// ════════════════════════════════════════════════════════════
function renderReservas() {
  const ch     = getChecked();
  const filter = S.resFilter;
  const total  = ALL_RES.length;
  const done   = ALL_RES.filter(r => ch[r.id]).length;
  const pct    = total ? Math.round(done / total * 100) : 0;

  const groups = [
    { prio: 'red',    label: '🔴 Urgente — fazer imediatamente'  },
    { prio: 'orange', label: '🟠 Alta prioridade'                 },
    { prio: 'green',  label: '🟢 Recomendado'                     },
  ];
  const gColor = { red: '#EF4444', orange: '#F97316', green: '#22C55E' };

  let html = `
    <div style="max-width:720px">
    <div class="view-title">📋 Checklist de Reservas</div>
    <div class="view-sub">6 pessoas · marque como feito conforme reservar</div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="progress-label">${done} de ${total} reservas concluídas · ${pct}%</div>
    <div class="filter-bar">
      <button class="filt-btn${filter==='all'    ? ' f-all'    :''}" onclick="setResFilter('all')">Todas (${total})</button>
      <button class="filt-btn${filter==='red'    ? ' f-red'    :''}" onclick="setResFilter('red')">🔴 Urgente</button>
      <button class="filt-btn${filter==='orange' ? ' f-orange' :''}" onclick="setResFilter('orange')">🟠 Alta</button>
      <button class="filt-btn${filter==='green'  ? ' f-green'  :''}" onclick="setResFilter('green')">🟢 Recomendado</button>
    </div>`;

  groups.forEach(g => {
    const items = ALL_RES.filter(r => r.prio === g.prio && (filter === 'all' || filter === g.prio));
    if (!items.length) return;
    html += `<div class="res-group-hd" style="color:${gColor[g.prio]}">${g.label}</div>`;
    items.forEach(r => {
      const isDone = !!ch[r.id];
      html += `<div class="big-res-card${isDone ? ' is-done' : ''}">
        <div class="brc-check${isDone ? ' done' : ''}" onclick="toggleCheck('${r.id}')">${isDone ? '✓' : ''}</div>
        <div class="brc-body${isDone ? ' is-done' : ''}">
          <span class="brc-dest" style="background:${r.destColor}">${r.destName} · D${r.dayN} · ${r.dayDate}</span>
          <div class="brc-name">${r.name}</div>
          <div class="brc-how">${r.how}</div>
          <div class="brc-obs">${r.obs}</div>
        </div>
      </div>`;
    });
  });

  html += `
    <div class="alerts-box">
      <div class="alerts-box-title">⚠️ Atenções especiais</div>
      <div class="alert-line">· D5 Tenerife (seg): Mirador de Garachico FECHADO às segundas — usar restaurante do centro histórico</div>
      <div class="alert-line">· D6 Tenerife: Aeroporto TFN ≠ TFS (Sul) — GPS "Aeropuerto Tenerife Norte"</div>
      <div class="alert-line">· D2 Madeira (qua): Mercado dos Lavradores — não comprar frutas no 1º piso (preços inflacionados)</div>
      <div class="alert-line">· D8 Madeira (ter): Pico do Arieiro — verificar webcam antes de sair: <strong>visitmadeira.pt</strong></div>
      <div class="alert-line">· D3 Madrid (sab): Templo de Debod fecha segunda — sábado está ✓ aberto</div>
    </div>
    </div>`;

  document.getElementById('view-reservas').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  RENDER: GASTRONOMIA
// ════════════════════════════════════════════════════════════
function renderGastro() {
  let html = `
    <div style="max-width:720px">
    <div class="view-title">🍴 Guias Gastronômicos</div>
    <div class="view-sub">Pratos obrigatórios em cada destino · orçamento €15-25/pess/jantar</div>`;

  GASTRO.forEach(g => {
    html += `<div class="gastro-section">
      <div class="gastro-hd" style="color:${g.color};border-color:${g.color}">
        ${DEST[g.dest].emoji} ${DEST[g.dest].name} · ${g.label}
      </div>
      <div class="dish-grid">`;
    g.dishes.forEach(d => {
      html += `<div class="dish-card" style="border-left-color:${g.color}">
        <div class="dish-name">${d.name}</div>
        <div class="dish-desc">${d.desc}</div>
        <div class="dish-where" style="color:${g.color}">📍 ${d.where}</div>
      </div>`;
    });
    html += '</div></div>';
  });

  html += `<div class="strategy-box">
    <div class="strategy-box-title">💰 Estratégia de alimentação (todos os destinos)</div>
    <div class="strategy-line">
      ☕ <strong>Café da manhã</strong> — No apartamento/hotel (comprar no supermercado no 1º dia) → <strong>€0</strong><br>
      🥤 <strong>Petiscos</strong> — Bares de praia, cafés nas paradas → <strong>€5-12/pess</strong><br>
      🍽️ <strong>Jantar</strong> — Restaurante local com reserva → <strong>€15-25/pess</strong><br>
      <br>
      <strong>Custo médio diário por pessoa: €20-37</strong><br>
      <br>
      🛒 <strong>Compras obrigatórias no 1º dia:</strong><br>
      · Tenerife → Mercadona ou Hiperdino em Los Cristianos<br>
      · Madeira → Pingo Doce na Rua Dr. Fernão de Ornelas (5 min do apartamento)
    </div>
  </div></div>`;

  document.getElementById('view-gastro').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  VIEW SWITCHER
// ════════════════════════════════════════════════════════════
function showView(view) {
  document.getElementById('view-itinerary').style.display = view === 'itinerary' ? 'flex'  : 'none';
  document.getElementById('view-reservas').style.display  = view === 'reservas'  ? 'block' : 'none';
  document.getElementById('view-gastro').style.display    = view === 'gastro'    ? 'block' : 'none';
  // Sidebar only shown in itinerary mode
  document.getElementById('sidebar').style.display = view === 'itinerary' ? '' : 'none';
}

function switchDest(destId) {
  closeSidebar();
  if (destId === 'reservas') {
    S.dest = 'reservas'; S.view = 'reservas';
    applyTheme('tenerife');
    showView('reservas');
    renderReservas();
  } else if (destId === 'gastro') {
    S.dest = 'gastro'; S.view = 'gastro';
    applyTheme('tenerife');
    showView('gastro');
    renderGastro();
  } else {
    S.dest   = destId;
    S.dayIdx = 0;
    S.view   = 'itinerary';
    applyTheme(destId);
    showView('itinerary');
    renderSidebar();
    renderDayHeader();
    renderTimeline();
    updateMap();
  }
  renderTabs();
}

function switchDay(idx) {
  S.dayIdx = idx;
  closeSidebar();
  renderSidebar();
  renderDayHeader();
  renderTimeline();
  updateMap();
  document.getElementById('timeline-wrap').scrollTop = 0;
}

function setResFilter(f) {
  S.resFilter = f;
  renderReservas();
}

// ════════════════════════════════════════════════════════════
//  SIDEBAR MOBILE TOGGLE
// ════════════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  applyTheme('tenerife');
  renderTabs();
  renderSidebar();
  renderDayHeader();
  renderTimeline();
  showView('itinerary');
  // Defer map init so layout is painted first
  requestAnimationFrame(() => updateMap());
});
</script>
